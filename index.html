<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#f4f1ea">
<title>حاسبة العائد الاستثماري</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700;800&display=swap");

:root{
  --bg:#faf9f5;
  --surface:rgba(255,255,255,.72);
  --surface-solid:#ffffff;
  --surface-soft:#f3f1ea;
  --surface-hover:#ece9e0;
  --ink:#141413;
  --muted:#83807a;
  --faint:#b0aea5;
  --line:rgba(20,20,19,.08);
  --accent:#d97757;
  --accent-hover:#c8654a;
  --accent-soft:#f4e3da;
  --accent-2:#6a9bcc;
  --success:#788c5d;
  --warning:#b5813f;
  --danger:#c1584e;
  --shadow:0 20px 48px rgba(20,20,19,.07),0 2px 8px rgba(20,20,19,.04);
  --shadow-soft:7px 7px 16px rgba(176,174,165,.26),-7px -7px 14px rgba(255,255,255,.9);
  --inset:inset 2px 2px 5px rgba(176,174,165,.32),inset -2px -2px 5px rgba(255,255,255,.85);
  --glass-blur:22px;
  --radius-lg:22px;
  --radius-md:15px;
  --radius-sm:11px;
}

[data-theme="dark"]{
  --bg:#141413;
  --surface:rgba(28,27,26,.7);
  --surface-solid:#1c1b1a;
  --surface-soft:#211f1d;
  --surface-hover:#292725;
  --ink:#faf9f5;
  --muted:#a8a49b;
  --faint:#6e6b64;
  --line:rgba(250,249,245,.08);
  --accent:#e08b6c;
  --accent-hover:#e89b80;
  --accent-soft:#3a2b23;
  --accent-2:#8bb4dd;
  --success:#93a878;
  --warning:#d1a05f;
  --danger:#e0847a;
  --shadow:0 26px 60px rgba(0,0,0,.35),0 2px 8px rgba(0,0,0,.22);
  --shadow-soft:7px 7px 16px rgba(0,0,0,.3),-7px -7px 14px rgba(255,255,255,.02);
  --inset:inset 2px 2px 6px rgba(0,0,0,.4),inset -2px -2px 5px rgba(255,255,255,.02);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  margin:0;
  min-height:100vh;
  padding:18px;
  background:radial-gradient(circle at 12% 0%,rgba(217,119,87,.06),transparent 28rem),radial-gradient(circle at 100% 15%,rgba(106,155,204,.05),transparent 32rem),var(--bg);
  color:var(--ink);
  font-family:"Tajawal","Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:14.5px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  transition:background .25s,color .25s;
}

[dir="rtl"] body{line-height:1.75}
[dir="ltr"] h1,[dir="ltr"] h2,[dir="ltr"] h3,[dir="ltr"] .cardTitle h2{letter-spacing:-.01em}

:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}

.money,.metricValue,td.money,th.money,.pill,input[type="number"],input[type="date"]{
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum" 1,"cv05" 1;
}
.money,.metricValue{font-family:"Inter",sans-serif}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--muted)}

button,input,select,textarea{font:inherit}
button{user-select:none;cursor:pointer}
h1,h2,h3,p{margin:0}

.app{max-width:1180px;margin:auto}

.topbar{
  position:sticky;top:12px;z-index:40;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  margin-bottom:18px;padding:10px 14px;
  border:1px solid var(--line);border-radius:var(--radius-lg);
  background:var(--surface);box-shadow:var(--shadow);
  backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
}

.brand{display:flex;align-items:center;gap:11px;min-width:0}
.brandMark{
  width:38px;height:38px;border-radius:12px;flex:none;
  background:linear-gradient(145deg,#e08b6c,#d97757);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:16px;
  box-shadow:0 6px 14px rgba(217,119,87,.35);
}
.brand h1{font-size:15.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.brand p{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.mainNav{
  display:flex;gap:3px;padding:4px;border-radius:14px;
  background:var(--surface-soft);box-shadow:var(--inset);flex:none;
}
.navBtn{
  border:none;background:transparent;color:var(--muted);
  padding:8px 14px;border-radius:11px;font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:background .16s,color .16s,box-shadow .16s;
}
.navBtn .navCount{
  font-size:10.5px;font-weight:700;background:var(--surface-hover);color:var(--muted);
  border-radius:20px;padding:1px 7px;
}
.navBtn.active{background:var(--surface-solid);color:var(--ink);box-shadow:var(--shadow-soft)}
.navBtn.active .navCount{background:var(--accent-soft);color:var(--accent)}
.navBtn:hover:not(.active){color:var(--ink)}

.actions{display:flex;gap:6px;flex:none}
.iconBtn,.softBtn,.primaryBtn,.dangerBtn{
  border:1px solid transparent;border-radius:12px;
  padding:9px 14px;font-size:12.5px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  transition:transform .14s,background .14s,color .14s,box-shadow .14s,opacity .14s;
}
.iconBtn{width:38px;height:38px;padding:0;justify-content:center;background:var(--surface-soft);color:var(--ink)}
.iconBtn:hover{background:var(--surface-hover)}
.softBtn{background:var(--surface-soft);color:var(--ink)}
.softBtn:hover{background:var(--surface-hover)}
.primaryBtn{background:linear-gradient(145deg,#e08b6c,#d97757);color:#fff;box-shadow:0 8px 18px rgba(217,119,87,.28)}
.primaryBtn:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(217,119,87,.34)}
.dangerBtn{background:transparent;color:var(--danger)}
.dangerBtn:hover{background:rgba(193,88,78,.1)}
.ghostBtn{border:none;background:transparent;color:var(--muted);padding:6px 10px;border-radius:9px;font-size:12px;font-weight:600}
.ghostBtn:hover{color:var(--ink);background:var(--surface-soft)}

button:disabled{opacity:.45;cursor:not-allowed;transform:none!important}

.view{display:flex;flex-direction:column;gap:16px;animation:fadeIn .22s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.card{
  background:var(--surface-solid);border:1px solid var(--line);
  border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow);
}

.cardHeader{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.cardTitle{display:flex;align-items:center;gap:12px}
.cardTitle h2{font-size:16.5px;font-weight:700}
.cardTitle p{font-size:12px;color:var(--muted);margin-top:2px}
.counter{
  width:34px;height:34px;border-radius:11px;flex:none;
  background:var(--surface-soft);box-shadow:var(--inset);
  display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent);font-size:14px;
}

.field{display:flex;flex-direction:column;gap:6px;min-width:0}
.field>span{font-size:11.5px;font-weight:600;color:var(--muted)}
.input,select.input{
  border:1px solid var(--line);background:var(--surface-soft);color:var(--ink);
  border-radius:var(--radius-sm);padding:10px 12px;min-height:42px;width:100%;
  box-shadow:var(--inset);transition:border .16s,box-shadow .16s,background .16s;
}
.input:focus,select.input:focus{outline:none;border-color:var(--accent);background:var(--surface-solid)}
.input::placeholder{color:var(--faint)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:820px){.grid3,.grid4{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}

.caseCard{
  border:1px solid var(--line);border-radius:var(--radius-md);padding:16px;
  background:var(--surface-soft);margin-bottom:12px;
}
.caseCard:last-child{margin-bottom:0}
.caseTop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.caseIdentity{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.caseNumber{
  width:28px;height:28px;border-radius:9px;flex:none;background:var(--accent-soft);color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12.5px;
}
.caseName{border:none;background:transparent;font-weight:700;font-size:14.5px;color:var(--ink);width:100%;padding:4px 2px}
.caseName:focus{outline:none}
.rowActions{display:flex;gap:4px;flex:none}

details.advanced{margin-top:12px}
details.advanced summary{
  cursor:pointer;font-size:12px;font-weight:600;color:var(--accent);list-style:none;
  display:inline-flex;align-items:center;gap:5px;padding:4px 0;
}
details.advanced summary::-webkit-details-marker{display:none}
details.advanced summary::before{content:"▸";transition:transform .16s;font-size:10px}
details.advanced[open] summary::before{transform:rotate(90deg)}
details.advanced .grid3{margin-top:12px}

.segmented{display:grid;gap:4px;padding:4px;border-radius:13px;background:var(--surface-soft);box-shadow:var(--inset)}
.segmented button{
  border:none;background:transparent;color:var(--muted);padding:9px 10px;border-radius:10px;
  font-size:12.5px;font-weight:600;transition:background .16s,color .16s,box-shadow .16s;
}
.segmented button.active{background:var(--surface-solid);color:var(--accent);box-shadow:var(--shadow-soft)}

.hint{font-size:11.5px;color:var(--muted);line-height:1.5}

.quickTools{border:1px dashed var(--line);border-radius:var(--radius-md);padding:12px;margin-bottom:14px}
.quickTools summary{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--ink);list-style:none;display:flex;align-items:center;gap:7px}
.quickTools summary::-webkit-details-marker{display:none}
.quickTools summary::before{content:"⚙";color:var(--accent)}
.quickToolsBody{margin-top:12px;display:flex;flex-direction:column;gap:12px}
.inlineRow{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.inlineRow .field{flex:1;min-width:130px}

.peopleTableWrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius-md)}
table.peopleTable{width:100%;border-collapse:collapse;min-width:520px}
table.peopleTable thead th{
  text-align:start;font-size:11px;font-weight:700;color:var(--muted);
  padding:10px 12px;background:var(--surface-soft);position:sticky;top:0;
}
table.peopleTable tbody td{padding:6px 8px;border-top:1px solid var(--line)}
table.peopleTable tbody tr:hover{background:var(--surface-soft)}
table.peopleTable input{border:none;background:transparent;padding:8px;border-radius:9px;width:100%;min-height:36px}
table.peopleTable input:focus{outline:none;background:var(--surface-soft)}
table.peopleTable td.numCol{width:34px;text-align:center;color:var(--faint);font-size:11.5px;font-weight:700}
table.peopleTable td.rmCol{width:38px;text-align:center}
.rmIcon{border:none;background:transparent;color:var(--faint);width:30px;height:30px;border-radius:9px;font-size:14px}
.rmIcon:hover{color:var(--danger);background:rgba(193,88,78,.1)}

.metricsStrip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:760px){.metricsStrip{grid-template-columns:1fr 1fr}}
.metric{
  border:1px solid var(--line);border-radius:var(--radius-md);padding:14px;
  background:var(--surface-soft);
}
.metric.accent{background:linear-gradient(160deg,var(--accent-soft),var(--surface-soft))}
.metricLabel{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px}
.metricValue{font-size:19px;font-weight:800;letter-spacing:-.2px}
.metricValue.accentText{color:var(--accent)}
.metricSub{font-size:10.5px;color:var(--faint);margin-top:4px}

.notice{
  font-size:12px;padding:10px 12px;border-radius:11px;margin-bottom:8px;
  background:rgba(181,129,63,.12);color:var(--warning);border:1px solid rgba(181,129,63,.22);
}

.reportTabs{display:flex;gap:4px;padding:4px;background:var(--surface-soft);border-radius:13px;box-shadow:var(--inset);margin-bottom:12px;width:max-content;max-width:100%;overflow-x:auto}
.reportTabs button{border:none;background:transparent;color:var(--muted);padding:9px 14px;border-radius:10px;font-size:12.5px;font-weight:600;white-space:nowrap}
.reportTabs button.active{background:var(--surface-solid);color:var(--ink);box-shadow:var(--shadow-soft)}

.filterBar{display:flex;gap:8px;margin-bottom:12px}
.filterBar .input{max-width:280px}

.tableShell{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius-md)}
table{width:100%;border-collapse:collapse;font-size:12.5px}
thead th{
  position:sticky;top:0;background:color-mix(in srgb,var(--surface-solid) 92%,transparent);
  backdrop-filter:blur(8px);text-align:start;padding:11px 12px;font-size:10.8px;
  font-weight:700;color:var(--muted);white-space:nowrap;border-bottom:1px solid var(--line);
}
tbody td{padding:10px 12px;border-bottom:1px solid var(--line);white-space:nowrap}
tbody tr:hover{background:var(--surface-soft)}
td.money,th.money{font-variant-numeric:tabular-nums}
.accentText{color:var(--accent);font-weight:700}
.mutedText{color:var(--muted);font-size:11.5px}
.pill{background:var(--accent-soft);color:var(--accent);padding:3px 10px;border-radius:20px;font-size:11.5px;font-weight:700}
.copyBtn{border:none;background:var(--surface-soft);color:var(--muted);width:28px;height:28px;border-radius:9px;font-size:12px}
.copyBtn:hover{color:var(--accent);background:var(--accent-soft)}

.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px}

dialog{
  border:none;border-radius:var(--radius-lg);padding:0;max-width:560px;width:92vw;
  background:var(--surface-solid);color:var(--ink);box-shadow:var(--shadow);
}
dialog::backdrop{background:rgba(20,20,19,.4);backdrop-filter:blur(3px)}
.modalHead{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--line)}
.modalHead h2{font-size:15.5px;font-weight:700}
.modalBody{padding:18px 20px;max-height:70vh;overflow:auto;display:flex;flex-direction:column;gap:18px}

.settingSection{border:1px solid var(--line);border-radius:var(--radius-md);padding:14px}
.settingTitle{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.settingTitle h3{font-size:13.5px;font-weight:700}
.settingTitle p{font-size:11.5px;color:var(--muted);margin-top:2px}
.rateRow,.holidayRow{display:grid;grid-template-columns:64px 1fr auto;gap:8px;align-items:center;margin-bottom:6px}
.dayGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.dayBtn{border:1px solid var(--line);background:var(--surface-soft);color:var(--muted);border-radius:10px;padding:9px 4px;font-size:11.5px;font-weight:700}
.dayBtn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.switch{display:flex;align-items:center;gap:8px;cursor:pointer}
.switch input{display:none}
.switchTrack{width:38px;height:22px;border-radius:20px;background:var(--surface-hover);position:relative;transition:background .18s;flex:none}
.switchThumb{position:absolute;top:2px;inset-inline-start:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 2px 5px rgba(0,0,0,.2);transition:inset-inline-start .18s}
.switch input:checked+.switchTrack{background:var(--accent)}
.switch input:checked+.switchTrack .switchThumb{inset-inline-start:18px}
.switchText{font-size:11.5px;color:var(--muted);font-weight:600}

.app{padding-bottom:86px}

.liveBar{
  position:fixed;bottom:16px;inset-inline:16px;z-index:35;max-width:1148px;margin:auto;
  display:flex;align-items:center;gap:0;padding:6px;
  border:1px solid var(--line);border-radius:18px;background:var(--surface);
  box-shadow:var(--shadow);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
  cursor:pointer;transition:transform .14s,box-shadow .14s;overflow-x:auto;
}
.liveBar:hover{transform:translateY(-2px)}
.liveBarMetric{
  flex:1;min-width:104px;padding:8px 14px;display:flex;flex-direction:column;gap:2px;
  border-inline-end:1px solid var(--line);
}
.liveBarMetric:last-of-type{border-inline-end:none}
.liveBarMetric span{font-size:10.5px;font-weight:600;color:var(--muted);white-space:nowrap}
.liveBarMetric strong{font-size:14.5px;font-weight:800;font-family:"Inter",sans-serif;font-variant-numeric:tabular-nums;white-space:nowrap}
.liveBarMetric.accent strong{color:var(--accent)}
.liveBarGo{
  flex:none;display:flex;align-items:center;gap:6px;padding:10px 16px;border-radius:12px;
  background:linear-gradient(145deg,#e08b6c,#d97757);color:#fff;font-size:12.5px;font-weight:700;white-space:nowrap;
}
@media(max-width:640px){
  .liveBarMetric{min-width:74px;padding:7px 10px}
  .liveBarMetric strong{font-size:12.5px}
  .liveBarGo span{display:none}
}

.status{
  position:fixed;bottom:20px;inset-inline-start:50%;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:var(--bg);padding:9px 18px;border-radius:20px;font-size:12px;font-weight:600;
  opacity:0;pointer-events:none;transition:opacity .22s,transform .22s;z-index:80;box-shadow:var(--shadow);
}
[dir="rtl"] .status{transform:translateX(50%) translateY(20px)}
.status.show{opacity:1;transform:translateX(-50%) translateY(0)}
[dir="rtl"] .status.show{transform:translateX(50%) translateY(0)}
</style>
</head>
<body>
<div id="app" class="app"></div>
<div id="status" class="status"></div>

<dialog id="settingsDialog">
  <div class="modalHead">
    <h2 id="settingsTitle"></h2>
    <button class="iconBtn" onclick="closeSettings()">✕</button>
  </div>
  <div class="modalBody" id="settingsBody"></div>
</dialog>

  id:uid(),
  name:"",
  shortageValue:"",
  expensesRate:10,
  startDate:"",
  endDate:"",
  scope:"both",
  appliesTo:"selectedBase",
  rounding:"total",
  compounding:true
});

const defaultState={
  lang:"ar",
  theme:"light",
  view:"cases",
  reportTab:"ledger",
  filter:"",
  distribution:"express",
  accrual:"commercial15",
  extraRate:2,
  extraRateEnabled:true,
  weekend:[5,6],
  holidays:[],
  rates:{...DEFAULT_RATES},
  cases:[blankCase()],
  people:[{id:uid(),name:"",joinDate:"",leaveDate:""}]
};

let state=loadState();
let saveTimer;
let statusTimer;

function loadState(){
  try{
    const saved=JSON.parse(localStorage.getItem("investment-return-pro")||"null");
    if(!saved)return structuredCloneSafe(defaultState);
    if(!["commercial15","actualActual","inclusiveMonths"].includes(saved.accrual)){
      saved.accrual="commercial15";
    }
    return{
      ...structuredCloneSafe(defaultState),
      ...saved,
      view:["cases","people","report"].includes(saved.view)?saved.view:"cases",
      reportTab:["ledger","peopleTotals","distributionDetails"].includes(saved.reportTab)?saved.reportTab:"ledger",
      rates:{...DEFAULT_RATES,...(saved.rates||{})},
      cases:(Array.isArray(saved.cases)&&saved.cases.length?saved.cases:[blankCase()]).map(item=>({compounding:true,...item})),
      people:Array.isArray(saved.people)&&saved.people.length?saved.people:[{id:uid(),name:"",joinDate:"",leaveDate:""}]
    };
  }catch{
    return structuredCloneSafe(defaultState);
  }
}

function structuredCloneSafe(value){
  return JSON.parse(JSON.stringify(value));
}

function saveState(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    localStorage.setItem("investment-return-pro",JSON.stringify(state));
    showStatus(I18N[state.lang].saved);
  },450);
}

function showStatus(message){
  const el=document.getElementById("status");
  if(!el)return;
  clearTimeout(statusTimer);
  el.textContent=message;
  el.classList.add("show");
  statusTimer=setTimeout(()=>el.classList.remove("show"),1300);
}

function esc(value){
  return String(value??"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function parseDate(value){
  if(!/^\d{4}-\d{2}-\d{2}$/.test(value||""))return null;
  const [y,m,d]=value.split("-").map(Number);
  const date=new Date(y,m-1,d);
  if(date.getFullYear()!==y||date.getMonth()!==m-1||date.getDate()!==d)return null;
  return date;
}

function dateKey(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,"0");
  const d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function utcDayNumber(date){
  return Date.UTC(date.getFullYear(),date.getMonth(),date.getDate())/86400000;
}

function inclusiveDays(start,end){
  return Math.max(0,utcDayNumber(end)-utcDayNumber(start)+1);
}

function daysInYear(year){
  return new Date(year,1,29).getMonth()===1?366:365;
}

function normalizeCommercialStart(d){
  if(d.getDate()>15)return new Date(d.getFullYear(),d.getMonth()+1,1);
  return new Date(d.getFullYear(),d.getMonth(),1);
}

function normalizeCommercialEnd(d){
  if(d.getDate()>=15)return new Date(d.getFullYear(),d.getMonth()+1,0);
  return new Date(d.getFullYear(),d.getMonth(),0);
}

function generateSegments(start,end){
  const segments=[];
  if(state.accrual==="commercial15"){
    const effStart=normalizeCommercialStart(start);
    const effEnd=normalizeCommercialEnd(end);
    if(effStart>effEnd)return[];
    for(let y=effStart.getFullYear();y<=effEnd.getFullYear();y++){
      const segStart=(y===effStart.getFullYear())?effStart:new Date(y,0,1);
      const segEnd=(y===effEnd.getFullYear())?effEnd:new Date(y,11,31);
      const months=(segEnd.getFullYear()-segStart.getFullYear())*12+segEnd.getMonth()-segStart.getMonth()+1;
      segments.push({year:y,from:segStart,to:segEnd,months,days:0,factor:months/12});
    }
    return segments;
  }
  for(let y=start.getFullYear();y<=end.getFullYear();y++){
    const from=start>new Date(y,0,1)?new Date(start):new Date(y,0,1);
    const to=end<new Date(y,11,31)?new Date(end):new Date(y,11,31);
    const days=inclusiveDays(from,to);
    const months=(to.getFullYear()-from.getFullYear())*12+to.getMonth()-from.getMonth()+1;
    const factor=state.accrual==="actualActual"?days/daysInYear(y):months/12;
    segments.push({year:y,from,to,months,days,factor});
  }
  return segments;
}

function clampRange(aStart,aEnd,bStart,bEnd){
  const start=aStart>bStart?aStart:bStart;
  const end=aEnd<bEnd?aEnd:bEnd;
  return start<=end?{start,end}:null;
}

function roundUnit(value){
  const v=Number(value)||0;
  const s=v<0?-1:1;
  return s*Math.round(Math.abs(v)+1e-9);
}

function numberValue(value){
  const n=Number(value);
  return Number.isFinite(n)?n:0;
}

function effectiveExtraRate(){
  return state.extraRateEnabled?numberValue(state.extraRate):0;
}

function workingDays(start,end){
  if(!start||!end||start>end)return 0;
  const holidaySet=new Set(state.holidays.map(h=>h.date).filter(Boolean));
  let total=0;
  const cursor=new Date(start);
  while(cursor<=end){
    if(!state.weekend.includes(cursor.getDay())&&!holidaySet.has(dateKey(cursor)))total++;
    cursor.setDate(cursor.getDate()+1);
  }
  return total;
}

function allocateUnits(total,weights,mode){
  const step=mode==="whole"?1:mode==="cents"?0.01:null;
  const cleanWeights=weights.map(w=>Math.max(0,numberValue(w)));
  const weightTotal=cleanWeights.reduce((a,b)=>a+b,0);
  if(weightTotal<=0)return cleanWeights.map(()=>0);
  if(step===null){
    return cleanWeights.map(w=>total*w/weightTotal);
  }
  const totalSteps=Math.round(total/step);
  const exact=cleanWeights.map(w=>totalSteps*w/weightTotal);
  const floors=exact.map(Math.floor);
  let remaining=totalSteps-floors.reduce((a,b)=>a+b,0);
  exact
    .map((value,index)=>({index,remainder:value-Math.floor(value)}))
    .sort((a,b)=>b.remainder-a.remainder||a.index-b.index)
    .forEach(item=>{
      if(remaining>0){floors[item.index]++;remaining--;}
      else if(remaining<0){floors[item.index]--;remaining++;}
    });
  return floors.map(v=>Math.round(v*step*100)/100);
}

function scopeLabel(scope,t){
  if(scope==="shortage")return t.scopeShortage;
  if(scope==="expenses")return t.scopeExpenses;
  return t.scopeBoth;
}

function applyRounding(rawSegments,mode){
  const segments=rawSegments.map(s=>({...s,returnValue:0}));
  let total=0;
  if(mode==="none"){
    segments.forEach(s=>{s.returnValue=s.rawReturn;});
    total=segments.reduce((sum,s)=>sum+s.rawReturn,0);
    return{segments,total};
  }
  if(mode==="perSegment"){
    segments.forEach(s=>{
      s.returnValue=roundUnit(s.rawReturn);
      total+=s.returnValue;
    });
    return{segments,total};
  }
  const exactTotal=segments.reduce((sum,s)=>sum+s.rawReturn,0);
  total=roundUnit(exactTotal);
  segments.forEach(s=>{s.returnValue=s.rawReturn;});
  return{segments,total};
}

function buildRawSegments(start,end,principal,compounding){
  const missingYears=[];
  let runningPrincipal=principal;
  const segments=generateSegments(start,end).map(seg=>{
    const rawRate=state.rates[seg.year];
    const missing=rawRate===""||rawRate===null||rawRate===undefined;
    if(missing)missingYears.push(seg.year);
    const annualRate=missing?0:numberValue(rawRate);
    const appliedRate=annualRate+effectiveExtraRate();
    const segPrincipal=runningPrincipal;
    const rawReturn=segPrincipal*appliedRate/100*seg.factor;
    if(compounding)runningPrincipal+=rawReturn;
    return{...seg,annualRate,appliedRate,segPrincipal,rawReturn};
  });
  return{segments,missingYears};
}

function computeCase(item){
  const start=parseDate(item.startDate);
  const end=parseDate(item.endDate);
  const shortage=numberValue(item.shortageValue);
  if(!start||!end||start>end||shortage<=0)return null;

  const expenseRate=numberValue(item.expensesRate);
  const expenseValue=shortage*expenseRate/100;
  const base=item.scope==="shortage"?shortage:item.scope==="expenses"?expenseValue:shortage+expenseValue;
  const principal=item.appliesTo==="shortageOnly"?shortage:base;
  const t=I18N[state.lang];

  const{segments:rawSegments,missingYears}=buildRawSegments(start,end,principal,item.compounding);
  const{segments,total:returnValue}=applyRounding(rawSegments,item.rounding);
  const due=item.rounding==="none"?base+returnValue:roundUnit(base+returnValue);

  return{
    id:item.id,
    name:item.name.trim()||`${t.calculation} ${state.cases.findIndex(c=>c.id===item.id)+1}`,
    shortage,
    expenseRate,
    expenseValue,
    base,
    principal,
    start,
    end,
    scope:item.scope,
    appliesTo:item.appliesTo,
    rounding:item.rounding,
    compounding:!!item.compounding,
    segments,
    returnValue,
    due,
    missingYears
  };
}

function eligiblePeople(){
  return state.people.filter(person=>person.name.trim());
}

function personRange(person,start,end){
  const join=parseDate(person.joinDate)||start;
  const leave=parseDate(person.leaveDate)||end;
  if(join>leave)return null;
  return clampRange(join,leave,start,end);
}

function personWeight(person,start,end){
  const range=personRange(person,start,end);
  return range?workingDays(range.start,range.end):0;
}

function personSegments(person,result,principalShare){
  const range=personRange(person,result.start,result.end);
  if(!range)return{segments:[],returnValue:0,missingYears:[]};
  const{segments:rawSegments,missingYears}=buildRawSegments(range.start,range.end,principalShare,result.compounding);
  const{segments,total}=applyRounding(rawSegments,result.rounding);
  return{segments,returnValue:total,missingYears};
}

function distributeCase(result,people){
  if(!people.length)return{rows:[],detailRows:[],unallocated:result.returnValue};

  if(state.distribution==="express"){
    const mode=result.rounding==="none"?"exact":"whole";
    const shares=allocateUnits(result.returnValue,people.map(()=>1),mode);
    const rows=people.map((person,index)=>({
      caseId:result.id,caseName:result.name,personId:person.id,personName:person.name,
      days:null,principalShare:null,returnValue:shares[index],amount:shares[index]
    }));
    return{rows,detailRows:rows.map(r=>({...r,year:null,period:null,annualRate:null,appliedRate:null,factor:null})),unallocated:0};
  }

  const weights=people.map(person=>personWeight(person,result.start,result.end));
  const weightTotal=weights.reduce((a,b)=>a+b,0);

  if(weightTotal<=0){
    const rows=people.map(person=>({
      caseId:result.id,caseName:result.name,personId:person.id,personName:person.name,
      days:0,principalShare:0,returnValue:0,amount:0
    }));
    return{rows,detailRows:[],unallocated:result.returnValue};
  }

  const principalShares=allocateUnits(result.principal,weights,"cents");
  const rows=[];
  const detailRows=[];

  people.forEach((person,index)=>{
    if(weights[index]<=0){
      rows.push({caseId:result.id,caseName:result.name,personId:person.id,personName:person.name,days:0,principalShare:0,returnValue:0,amount:0});
      return;
    }
    const calc=personSegments(person,result,principalShares[index]);
    calc.missingYears.forEach(year=>{if(!result.missingYears.includes(year))result.missingYears.push(year);});
    const amount=principalShares[index]+calc.returnValue;
    rows.push({
      caseId:result.id,caseName:result.name,personId:person.id,personName:person.name,
      days:weights[index],principalShare:principalShares[index],returnValue:calc.returnValue,amount
    });
    if(calc.segments.length){
      calc.segments.forEach(seg=>{
        detailRows.push({
          caseId:result.id,caseName:result.name,personId:person.id,personName:person.name,
          year:seg.year,period:{from:seg.from,to:seg.to},days:weights[index],
          principalShare:seg.segPrincipal,annualRate:seg.annualRate,appliedRate:seg.appliedRate,
          factor:seg.factor,returnValue:seg.returnValue,noAccrual:false
        });
      });
    }else{
      detailRows.push({
        caseId:result.id,caseName:result.name,personId:person.id,personName:person.name,
        year:null,period:null,days:weights[index],
        principalShare:principalShares[index],annualRate:0,appliedRate:0,
        factor:0,returnValue:0,noAccrual:true
      });
    }
  });

  return{rows,detailRows,unallocated:0};
}

function computeAll(){
  const valid=state.cases.map(computeCase).filter(Boolean);
  const invalidCount=state.cases.length-valid.length;
  const people=eligiblePeople();
  const distributionDetails=[];
  const distributionRows=[];
  let unallocated=0;

  valid.forEach(result=>{
    const distribution=distributeCase(result,people);
    distributionRows.push(...distribution.rows);
    distributionDetails.push(...distribution.detailRows);
    unallocated=roundUnit(unallocated+distribution.unallocated);
  });

  const summaryMap=new Map();
  distributionRows.forEach(row=>{
    if(!summaryMap.has(row.personId)){
      summaryMap.set(row.personId,{personId:row.personId,personName:row.personName,days:0,principalShare:0,returnValue:0,amount:0});
    }
    const target=summaryMap.get(row.personId);
    if(row.days!==null)target.days+=row.days;
    if(row.principalShare!==null)target.principalShare+=row.principalShare;
    target.returnValue+=row.returnValue;
    target.amount+=row.amount;
  });

  return{
    cases:valid,
    invalidCount,
    people,
    distributionRows,
    distributionDetails,
    distributionSummary:[...summaryMap.values()],
    shortageTotal:valid.reduce((sum,item)=>sum+item.shortage,0),
    expenseTotal:valid.reduce((sum,item)=>sum+item.expenseValue,0),
    returnTotal:valid.reduce((sum,item)=>sum+item.returnValue,0),
    grandTotal:valid.reduce((sum,item)=>sum+item.due,0),
    missingYears:[...new Set(valid.flatMap(item=>item.missingYears))].sort((a,b)=>a-b),
    unallocated
  };
}

function formatMoneyInput(raw){
  const cleaned=String(raw??"").replace(/,/g,"");
  if(cleaned==="")return"";
  const n=Number(cleaned);
  if(!Number.isFinite(n))return cleaned;
  const parts=cleaned.split(".");
  const intPart=Math.trunc(Math.abs(n)).toLocaleString("en-US");
  const sign=n<0?"-":"";
  return parts.length>1?`${sign}${intPart}.${parts[1]}`:`${sign}${intPart}`;
}

function money(value){

function moneyPrecise(value){

function formatDate(date){

  const leaveDate=(last&&last.leaveDate)?last.leaveDate:(fallbackCase?fallbackCase.endDate:"");
  return{id:uid(),name:"",joinDate,leaveDate};
}

  for(let i=0;i<n;i++)state.people.push(inheritedPerson());

function parseFlexibleDate(value){
  const v=(value||"").trim();
  if(!v)return"";
  if(/^\d{4}-\d{2}-\d{2}$/.test(v))return v;
  const slash=v.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
  if(slash){
    const day=slash[1].padStart(2,"0");
    const month=slash[2].padStart(2,"0");
    return`${slash[3]}-${month}-${day}`;
  }
  return"";
}

function addPeopleFromPaste(){
  const ta=document.getElementById("pasteArea");
  if(!ta)return;
  const lines=ta.value.split("\n").map(l=>l.trim()).filter(Boolean);
  if(!lines.length)return;
  lines.forEach(line=>{
    const parts=line.includes("\t")?line.split("\t"):line.split(",");
    const name=(parts[0]||"").trim();
    if(!name)return;
    const fallback=inheritedPerson();
    const joinDate=parseFlexibleDate(parts[1])||fallback.joinDate;
    const leaveDate=parseFlexibleDate(parts[2])||fallback.leaveDate;
    state.people.push({id:uid(),name,joinDate,leaveDate});
  });
  ta.value="";
  render();
  saveState();
}

  if(idx>-1&&idx+1<inputs.length)inputs[idx+1].focus();
}

function ledgerRows(cases){
  const t=I18N[state.lang];
  return cases.flatMap(item=>{
    const principalLogic=item.appliesTo==="shortageOnly"?t.shortageLogic:t.selectedBaseLogic;
    const compoundingLogic=item.compounding?t.compoundingMode:t.simpleMode;
    const logic=`${scopeLabel(item.scope,t)} · ${principalLogic} · ${compoundingLogic} · ${getAccrualLabel(state.accrual,t)} · ${roundingLabel(item.rounding,t)}`;

    if(!item.segments.length){
      return[`
        <tr>
          <td><span class="pill">${esc(item.name)}</span></td>
          <td>—</td>
          <td>${periodText(item.start,item.end)}</td>
          <td class="money">${money(item.shortage)}</td>
          <td>${percent(item.expenseRate)}</td>
          <td class="money">${money(item.expenseValue)}</td>
          <td class="money">${money(item.base)}</td>
          <td class="money">—</td>
          <td>—</td>
          <td>—</td>
          <td>—</td>
          <td>—</td>
          <td>—</td>
          <td class="money accentText">${money(0)}</td>
          <td class="money">${item.rounding==="none"?moneyPrecise(item.due):money(item.due)}</td>
          <td class="mutedText">${esc(logic)} · ${esc(t.noAccrualPeriod)}</td>
          <td><button class="copyBtn" onclick="copyRow(this)" title="${t.copyRow}">⧉</button></td>
        </tr>
      `];
    }

    return item.segments.map(seg=>{
      const duration=state.accrual==="actualActual"?`${seg.days} ${t.days}`:`${seg.months} ${t.months}`;
      return`
        <tr>
          <td><span class="pill">${esc(item.name)}</span></td>
          <td>${seg.year}</td>
          <td>${periodText(seg.from,seg.to)}</td>
          <td class="money">${money(item.shortage)}</td>
          <td>${percent(item.expenseRate)}</td>
          <td class="money">${money(item.expenseValue)}</td>
          <td class="money">${money(item.base)}</td>
          <td class="money">${money(seg.segPrincipal)}</td>
          <td>${percent(seg.annualRate)}</td>
          <td>${percent(effectiveExtraRate())}</td>
          <td>${percent(seg.appliedRate)}</td>
          <td>${duration}</td>
          <td>${decimal(seg.factor)}</td>
          <td class="money accentText">${item.rounding==="none"?moneyPrecise(seg.returnValue):money(seg.returnValue)}</td>
          <td class="money">${item.rounding==="none"?moneyPrecise(item.due):money(item.due)}</td>
          <td class="mutedText">${esc(logic)}</td>
          <td><button class="copyBtn" onclick="copyRow(this)" title="${t.copyRow}">⧉</button></td>
        </tr>
      `;
    });
  }).join("");
}

function reportTableHTML(data){
  const t=I18N[state.lang];
  const query=state.filter.trim().toLowerCase();

  if(!data.cases.length)return`<div class="empty">${t.noResults}</div>`;

  if(state.reportTab==="ledger"){
    const cases=query?data.cases.filter(item=>item.name.toLowerCase().includes(query)||item.segments.some(seg=>String(seg.year).includes(query))):data.cases;
    return`
      <div class="tableShell">
        <table>
          <thead>
            <tr>
              <th>${t.case}</th><th>${t.year}</th><th>${t.period}</th><th class="money">${t.shortage}</th>
              <th>${t.expenseRate}</th><th class="money">${t.expenseValue}</th><th class="money">${t.base}</th>
              <th class="money">${t.yearPrincipal}</th><th>${t.annualRate}</th><th>${t.addition}</th><th>${t.appliedRate}</th>
              <th>${t.duration}</th><th>${t.factor}</th><th class="money">${t.returned}</th><th class="money">${t.due}</th>
              <th>${t.logic}</th><th></th>
            </tr>
          </thead>
          <tbody>${ledgerRows(cases)}</tbody>
        </table>
      </div>
    `;
  }

  if(state.reportTab==="peopleTotals"){
    const summary=query?data.distributionSummary.filter(row=>row.personName.toLowerCase().includes(query)):data.distributionSummary;
    return`
      <div class="tableShell">
        <table>
          <thead>
            <tr>
              <th>${t.person}</th>
              ${state.distribution==="expanded"?`<th>${t.workdayWeight}</th><th class="money">${t.principalShare}</th>`:""}
              <th class="money">${t.returned}</th><th class="money">${t.due}</th><th>${t.logic}</th><th></th>
            </tr>
          </thead>
          <tbody>${peopleTotalsRows(summary)}</tbody>
        </table>
      </div>
    `;
  }

  if(state.distribution==="express"){
    const rows=query?data.distributionRows.filter(row=>row.personName.toLowerCase().includes(query)||row.caseName.toLowerCase().includes(query)):data.distributionRows;
    return`
      <div class="tableShell">
        <table>
          <thead><tr><th>${t.case}</th><th>${t.person}</th><th class="money">${t.returned}</th><th>${t.logic}</th><th></th></tr></thead>
          <tbody>${detailRows(rows)}</tbody>
        </table>
      </div>
    `;
  }

  const details=query?data.distributionDetails.filter(row=>row.personName.toLowerCase().includes(query)||row.caseName.toLowerCase().includes(query)):data.distributionDetails;
  return`
    <div class="tableShell">
      <table>
        <thead>
          <tr>
            <th>${t.case}</th><th>${t.person}</th><th>${t.year}</th><th>${t.period}</th><th>${t.workdayWeight}</th>
            <th class="money">${t.principalShare}</th><th>${t.annualRate}</th><th>${t.appliedRate}</th><th>${t.factor}</th>
            <th class="money">${t.returned}</th><th></th>
          </tr>
        </thead>
        <tbody>${detailRows(details)}</tbody>
      </table>
    </div>
  `;
}

function renderSettingsBody(){

}

function copyRow(btn){
  const tr=btn.closest("tr");
  if(!tr)return;
  const cells=[...tr.querySelectorAll("td")].filter(td=>!td.querySelector(".copyBtn"));
  const text=cells.map(td=>td.textContent.trim()).join("\t");
  navigator.clipboard?.writeText(text).then(()=>showStatus(I18N[state.lang].copied));
}

function extractVisibleTable(){
  const table=document.querySelector("#reportTable table");
  if(!table)return null;
  return[...table.querySelectorAll("tr")].map(tr=>
    [...tr.querySelectorAll("th,td")]
      .filter(cell=>!cell.querySelector(".copyBtn"))
      .map(cell=>cell.textContent.trim())
  );
}

function copyTable(){
  const rows=extractVisibleTable();
  if(!rows)return;
  const text=rows.map(r=>r.join("\t")).join("\n");
  navigator.clipboard?.writeText(text).then(()=>showStatus(I18N[state.lang].copied));
}

function exportCurrentView(){
  if(typeof XLSX==="undefined"){
    alert("Excel export engine is loading, please try again in a moment.");
    return;
  }
  const t=I18N[state.lang];
  const rows=extractVisibleTable();
  if(!rows||!rows.length)return;
  const data=computeAll();
  const aoa=[[summaryLine(data)],[],...rows];
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(aoa);
  ws["!merges"]=[{s:{r:0,c:0},e:{r:0,c:Math.max(0,rows[0].length-1)}}];
  const tabName=state.reportTab==="ledger"?t.ledger:state.reportTab==="peopleTotals"?t.peopleTotals:t.distributionDetails;
  XLSX.utils.book_append_sheet(wb,ws,tabName.slice(0,31));
  const stamp=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`${tabName}-${stamp}.xlsx`);
  showStatus(t.exported);
}
