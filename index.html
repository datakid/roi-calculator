<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#f4f1ea">
<title>حاسبة العائد الاستثماري</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800&display=swap");

:root{
  --bg:#faf9f5;
  --surface:rgba(255,255,255,.74);
  --surface-solid:#ffffff;
  --surface-soft:#f3f1ea;
  --surface-hover:#ece9e0;
  --ink:#141413;
  --muted:#83807a;
  --faint:#b0aea5;
  --line:rgba(20,20,19,.08);
  --line-soft:rgba(20,20,19,.05);
  --accent:#d97757;
  --accent-hover:#c8654a;
  --accent-soft:#f4e3da;
  --accent-2:#6a9bcc;
  --success:#788c5d;
  --warning:#b5813f;
  --danger:#c1584e;
  --shadow-xs:0 1px 2px rgba(20,20,19,.05);
  --shadow-sm:0 3px 10px rgba(20,20,19,.05),0 1px 2px rgba(20,20,19,.05);
  --shadow:0 18px 44px rgba(20,20,19,.08),0 3px 10px rgba(20,20,19,.04),0 0 0 1px rgba(20,20,19,.02);
  --shadow-lg:0 30px 70px rgba(20,20,19,.12),0 8px 22px rgba(20,20,19,.06);
  --shadow-soft:6px 6px 15px rgba(176,174,165,.24),-6px -6px 13px rgba(255,255,255,.92);
  --inset:inset 2px 2px 5px rgba(176,174,165,.30),inset -2px -2px 5px rgba(255,255,255,.85);
  --glow-accent:0 0 0 4px var(--accent-soft);
  --glass-blur:24px;
  --radius-xs:9px;
  --radius-sm:13px;
  --radius-md:18px;
  --radius-lg:26px;
  --radius-xl:30px;
  --radius-pill:999px;
  --ease:cubic-bezier(.22,1,.36,1);
  --ease-soft:cubic-bezier(.4,0,.2,1);
}

[data-theme="dark"]{
  --bg:#141413;
  --surface:rgba(28,27,26,.72);
  --surface-solid:#1c1b1a;
  --surface-soft:#211f1d;
  --surface-hover:#292725;
  --ink:#faf9f5;
  --muted:#a8a49b;
  --faint:#6e6b64;
  --line:rgba(250,249,245,.09);
  --line-soft:rgba(250,249,245,.05);
  --accent:#e08b6c;
  --accent-hover:#e89b80;
  --accent-soft:#3a2b23;
  --accent-2:#8bb4dd;
  --success:#93a878;
  --warning:#d1a05f;
  --danger:#e0847a;
  --shadow-xs:0 1px 2px rgba(0,0,0,.3);
  --shadow-sm:0 3px 10px rgba(0,0,0,.28),0 1px 2px rgba(0,0,0,.2);
  --shadow:0 22px 54px rgba(0,0,0,.4),0 4px 14px rgba(0,0,0,.25),0 0 0 1px rgba(250,249,245,.03);
  --shadow-lg:0 34px 80px rgba(0,0,0,.5),0 10px 26px rgba(0,0,0,.32);
  --shadow-soft:6px 6px 15px rgba(0,0,0,.32),-6px -6px 13px rgba(255,255,255,.025);
  --inset:inset 2px 2px 6px rgba(0,0,0,.42),inset -2px -2px 5px rgba(255,255,255,.025);
  --glow-accent:0 0 0 4px var(--accent-soft);
}

*{box-sizing:border-box}
html{scroll-behavior:smooth}

body{
  margin:0;
  min-height:100vh;
  padding:18px;
  background:radial-gradient(circle at 12% 0%,rgba(217,119,87,.07),transparent 30rem),radial-gradient(circle at 100% 18%,rgba(106,155,204,.055),transparent 34rem),var(--bg);
  color:var(--ink);
  font-family:"Tajawal","Inter",-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:14.5px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  transition:background .3s var(--ease-soft),color .3s var(--ease-soft);
}

[dir="rtl"] body{line-height:1.75}
[dir="ltr"] h1,[dir="ltr"] h2,[dir="ltr"] h3,[dir="ltr"] .cardTitle h2{letter-spacing:-.012em}

::selection{background:var(--accent-soft);color:var(--accent-hover)}

:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}

.money,.metricValue,td.money,th.money,.pill,input[type="number"],input[type="date"]{
  font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum" 1,"cv05" 1;
}
.money,.metricValue{font-family:"Inter",sans-serif}

::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line);border-radius:var(--radius-pill);border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:var(--faint);background-clip:padding-box}

button,input,select,textarea{font:inherit}
button{user-select:none;cursor:pointer;-webkit-tap-highlight-color:transparent}
button:active:not(:disabled){transform:scale(.972)}
h1,h2,h3,p{margin:0}

.app{max-width:1180px;margin:auto}

.topbar{
  position:sticky;top:12px;z-index:40;
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  margin-bottom:20px;padding:10px 12px 10px 16px;
  border:1px solid var(--line);border-radius:var(--radius-xl);
  background:var(--surface);box-shadow:var(--shadow);
  backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
  transition:box-shadow .3s var(--ease-soft),border-color .3s var(--ease-soft);
}
[dir="rtl"] .topbar{padding:10px 16px 10px 12px}

.brand{display:flex;align-items:center;gap:12px;min-width:0}
.brandMark{
  width:38px;height:38px;border-radius:13px;flex:none;
  background:linear-gradient(155deg,#eda285 0%,#e2916f 45%,#d97757 100%);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 14px rgba(217,119,87,.32),inset 0 1px 1px rgba(255,255,255,.35);
  position:relative;
}
.brand h1{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.005em}

.mainNav{
  display:flex;gap:3px;padding:4px;border-radius:var(--radius-pill);
  background:var(--surface-soft);box-shadow:var(--inset);flex:none;
}
.navBtn{
  border:none;background:transparent;color:var(--muted);
  padding:8px 15px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  transition:background .2s var(--ease-soft),color .2s var(--ease-soft),box-shadow .2s var(--ease-soft);
}
.navBtn .navCount{
  font-size:10.5px;font-weight:700;background:var(--surface-hover);color:var(--muted);
  border-radius:var(--radius-pill);padding:1px 7px;
  transition:background .2s var(--ease-soft),color .2s var(--ease-soft);
}
.navBtn.active{background:var(--surface-solid);color:var(--ink);box-shadow:0 3px 8px rgba(20,20,19,.09),0 0 0 1px var(--line-soft)}
.navBtn.active .navCount{background:var(--accent-soft);color:var(--accent)}
.navBtn:hover:not(.active){color:var(--ink)}

.actions{display:flex;gap:6px;flex:none}
.iconBtn,.softBtn,.primaryBtn,.dangerBtn{
  border:1px solid transparent;border-radius:var(--radius-sm);
  padding:9px 15px;font-size:12.5px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
  transition:transform .18s var(--ease),background .18s var(--ease-soft),color .18s var(--ease-soft),box-shadow .18s var(--ease-soft),opacity .18s var(--ease-soft),border-color .18s var(--ease-soft);
}
.iconBtn{width:38px;height:38px;padding:0;justify-content:center;background:transparent;color:var(--muted);border-radius:var(--radius-sm)}
.iconBtn:hover{background:var(--surface-soft);color:var(--ink)}
.softBtn{background:var(--surface-soft);color:var(--ink)}
.softBtn:hover{background:var(--surface-hover);transform:translateY(-1px)}
.primaryBtn{background:linear-gradient(155deg,#e59873,#d97757 65%,#cc6a4b);color:#fff;box-shadow:0 8px 18px rgba(217,119,87,.3),inset 0 1px 1px rgba(255,255,255,.22)}
.primaryBtn:hover{transform:translateY(-1.5px);box-shadow:0 12px 24px rgba(217,119,87,.36),inset 0 1px 1px rgba(255,255,255,.25)}
.dangerBtn{background:transparent;color:var(--danger)}
.dangerBtn:hover{background:rgba(193,88,78,.1)}
.ghostBtn{border:none;background:transparent;color:var(--muted);padding:6px 11px;border-radius:var(--radius-xs);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:background .18s var(--ease-soft),color .18s var(--ease-soft)}
.ghostBtn:hover{color:var(--ink);background:var(--surface-soft)}
.iconBtn svg,.softBtn svg,.primaryBtn svg,.dangerBtn svg,.copyBtn svg,.rmIcon svg{display:block}

button:disabled{opacity:.42;cursor:not-allowed;transform:none!important}

.view{display:flex;flex-direction:column;gap:16px;animation:fadeIn .28s var(--ease)}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.card{
  background:var(--surface-solid);border:1px solid var(--line);
  border-radius:var(--radius-lg);padding:22px;box-shadow:var(--shadow);
  transition:box-shadow .25s var(--ease-soft);
}

.cardHeader{display:flex;align-items:center;justify-content:space-between;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.cardTitle{display:flex;align-items:center;gap:13px}
.cardTitle h2{font-size:16.5px;font-weight:700;letter-spacing:-.01em}
.cardTitle p{font-size:12px;color:var(--muted);margin-top:2px}
.counter{
  width:35px;height:35px;border-radius:var(--radius-xs);flex:none;
  background:var(--surface-soft);box-shadow:var(--inset);
  display:flex;align-items:center;justify-content:center;font-weight:800;color:var(--accent);font-size:14px;
}

.field{display:flex;flex-direction:column;gap:6px;min-width:0}
.field>span{font-size:11.5px;font-weight:600;color:var(--muted)}
.input,select.input{
  border:1px solid var(--line);background:var(--surface-soft);color:var(--ink);
  border-radius:var(--radius-sm);padding:10px 13px;min-height:43px;width:100%;
  box-shadow:var(--inset);transition:border .2s var(--ease-soft),box-shadow .2s var(--ease-soft),background .2s var(--ease-soft);
}
.input:focus,select.input:focus{outline:none;border-color:var(--accent);background:var(--surface-solid);box-shadow:var(--glow-accent)}
.input::placeholder{color:var(--faint)}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
@media(max-width:980px){.grid5{grid-template-columns:repeat(3,1fr)}}
@media(max-width:820px){.grid3,.grid4{grid-template-columns:1fr 1fr}}
@media(max-width:620px){.grid5{grid-template-columns:1fr 1fr}}
@media(max-width:520px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}
@media(max-width:420px){.grid5{grid-template-columns:1fr}}

.caseCard{
  border:1px solid var(--line);border-radius:var(--radius-md);padding:17px;
  background:var(--surface-soft);margin-bottom:12px;
  transition:border-color .2s var(--ease-soft),box-shadow .2s var(--ease-soft);
}
.caseCard:last-child{margin-bottom:0}
.caseCard:hover{border-color:color-mix(in srgb,var(--faint) 55%,transparent)}
.caseTop{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}
.caseIdentity{display:flex;align-items:center;gap:11px;flex:1;min-width:0}
.caseNumber{
  width:29px;height:29px;border-radius:var(--radius-xs);flex:none;background:var(--accent-soft);color:var(--accent);
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12.5px;
}
.caseName{border:none;background:transparent;font-weight:700;font-size:14.5px;color:var(--ink);width:100%;padding:4px 2px;border-radius:6px;transition:background .15s var(--ease-soft)}
.caseName:focus{outline:none;background:var(--surface-hover)}
.rowActions{display:flex;gap:4px;flex:none}

details.advanced{margin-top:12px}
details.advanced summary{
  cursor:pointer;font-size:12px;font-weight:600;color:var(--accent);list-style:none;
  display:inline-flex;align-items:center;gap:5px;padding:4px 0;
}
details.advanced summary::-webkit-details-marker{display:none}
details.advanced summary::before{
  content:"";width:6px;height:6px;flex:none;
  border-inline-end:1.6px solid currentColor;border-block-end:1.6px solid currentColor;
  transform:rotate(-45deg);transition:transform .2s var(--ease);
}
details.advanced[open] summary::before{transform:rotate(45deg)}
details.advanced .grid3{margin-top:12px}

.checklistRow{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.checkChip{
  border:1px solid var(--line);background:var(--surface-soft);color:var(--muted);
  border-radius:var(--radius-pill);padding:9px 15px 9px 12px;font-size:12.5px;font-weight:700;
  display:inline-flex;align-items:center;gap:8px;
  transition:background .2s var(--ease-soft),color .2s var(--ease-soft),border-color .2s var(--ease-soft),transform .16s var(--ease);
}
[dir="rtl"] .checkChip{padding:9px 12px 9px 15px}
.checkChip .chipDot{
  width:16px;height:16px;border-radius:6px;border:1.6px solid var(--faint);flex:none;
  display:flex;align-items:center;justify-content:center;color:#fff;
  transition:background .18s var(--ease-soft),border-color .18s var(--ease-soft);
}
.checkChip .chipDot svg{display:none}
.checkChip.active{background:var(--accent-soft);color:var(--accent);border-color:var(--accent-soft)}
.checkChip.active .chipDot{background:var(--accent);border-color:var(--accent)}
.checkChip.active .chipDot svg{display:block}
.checkChip:hover:not(.active){border-color:var(--faint);transform:translateY(-1px)}
.checkChip.small{padding:6px 12px 6px 10px;font-size:11.5px}
[dir="rtl"] .checkChip.small{padding:6px 10px 6px 12px}
.checkChip.small .chipDot{width:14px;height:14px}
.checklistSubRow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;padding:11px 13px;border-inline-start:2px solid var(--accent);background:var(--surface-soft);border-radius:0 var(--radius-sm) var(--radius-sm) 0}
.checklistSubLabel{font-size:11px;font-weight:700;color:var(--muted);margin-inline-end:2px}

.rowWarning{border-color:rgba(193,88,78,.35)!important;background:rgba(193,88,78,.05)!important}
.warnBadge{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:700;color:var(--danger);background:rgba(193,88,78,.1);border-radius:var(--radius-pill);padding:2px 9px;white-space:nowrap}

.segmented{display:grid;gap:4px;padding:4px;border-radius:var(--radius-md);background:var(--surface-soft);box-shadow:var(--inset)}
.segmented button{
  border:none;background:transparent;color:var(--muted);padding:9px 11px;border-radius:var(--radius-xs);
  font-size:12.5px;font-weight:600;transition:background .2s var(--ease-soft),color .2s var(--ease-soft),box-shadow .2s var(--ease-soft);
}
.segmented button.active{background:var(--surface-solid);color:var(--accent);box-shadow:var(--shadow-soft)}

.hint{font-size:11.5px;color:var(--muted);line-height:1.55}

.quickTools{border:1px dashed var(--line);border-radius:var(--radius-md);padding:13px;margin-bottom:14px;transition:border-color .2s var(--ease-soft)}
.quickTools[open]{border-style:solid;border-color:var(--line)}
.quickTools summary{cursor:pointer;font-size:12.5px;font-weight:700;color:var(--ink);list-style:none;display:flex;align-items:center;gap:7px}
.quickTools summary::-webkit-details-marker{display:none}
.quickTools summary svg{color:var(--accent);flex:none}
.quickToolsBody{margin-top:13px;display:flex;flex-direction:column;gap:12px}
.inlineRow{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.inlineRow .field{flex:1;min-width:130px}

.peopleTableWrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--radius-md)}
table.peopleTable{width:100%;border-collapse:collapse;min-width:520px}
table.peopleTable thead th{
  text-align:start;font-size:11px;font-weight:700;color:var(--muted);
  padding:11px 13px;background:var(--surface-soft);position:sticky;top:0;
}
table.peopleTable tbody td{padding:6px 8px;border-top:1px solid var(--line)}
table.peopleTable tbody tr{transition:background .15s var(--ease-soft)}
table.peopleTable tbody tr:hover{background:var(--surface-soft)}
table.peopleTable input{border:none;background:transparent;padding:8px;border-radius:var(--radius-xs);width:100%;min-height:36px;transition:background .15s var(--ease-soft)}
table.peopleTable input:focus{outline:none;background:var(--surface-solid);box-shadow:var(--glow-accent)}
table.peopleTable td.numCol{width:34px;text-align:center;color:var(--faint);font-size:11.5px;font-weight:700}
table.peopleTable td.rmCol{width:38px;text-align:center}
.rmIcon{border:none;background:transparent;color:var(--faint);width:30px;height:30px;border-radius:var(--radius-xs);display:inline-flex;align-items:center;justify-content:center;transition:background .18s var(--ease-soft),color .18s var(--ease-soft)}
.rmIcon:hover{color:var(--danger);background:rgba(193,88,78,.1)}

.metricsStrip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
@media(max-width:760px){.metricsStrip{grid-template-columns:1fr 1fr}}
.metric{
  border:1px solid var(--line);border-radius:var(--radius-md);padding:15px;
  background:var(--surface-soft);transition:transform .2s var(--ease),box-shadow .2s var(--ease),border-color .2s var(--ease-soft);
}
.metric:hover{transform:translateY(-1.5px);border-color:color-mix(in srgb,var(--faint) 45%,transparent)}
.metric.accent{background:linear-gradient(160deg,var(--accent-soft),var(--surface-soft))}
.metricLabel{font-size:11px;color:var(--muted);font-weight:600;margin-bottom:6px}
.metricValue{font-size:19px;font-weight:800;letter-spacing:-.2px}
.metricValue.accentText{color:var(--accent)}
.metricSub{font-size:10.5px;color:var(--faint);margin-top:4px}

.notice{
  font-size:12px;padding:10px 13px;border-radius:var(--radius-sm);margin-bottom:8px;
  background:rgba(181,129,63,.12);color:var(--warning);border:1px solid rgba(181,129,63,.22);
}

.reportDoc{border-top:3px solid var(--accent);padding-top:22px}
.reportToolbar{display:flex;justify-content:flex-end;gap:8px;margin-bottom:18px}
.reportLetterhead{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap}
.reportLetterheadTop{display:flex;align-items:center;gap:15px}
.reportLetterheadMark{width:46px;height:46px;border-radius:15px;flex:none;background:linear-gradient(155deg,#eda285,#d97757 70%,#cc6a4b);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 18px rgba(217,119,87,.28),inset 0 1px 1px rgba(255,255,255,.3)}
.reportLetterhead h2{font-size:19px;font-weight:800;letter-spacing:-.01em}
.reportLetterhead p{font-size:12.5px;color:var(--muted);margin-top:3px}
.reportLetterheadMeta{font-size:11px;color:var(--faint);font-weight:600;line-height:1.6;text-align:end;white-space:nowrap}
.reportDivider{height:1px;background:linear-gradient(90deg,transparent,var(--line) 12%,var(--line) 88%,transparent);margin:19px 0 21px}

.reportTabs{display:flex;gap:4px;padding:4px;background:var(--surface-soft);border-radius:var(--radius-pill);box-shadow:var(--inset);margin-bottom:12px;width:max-content;max-width:100%;overflow-x:auto}
.reportTabs button{border:none;background:transparent;color:var(--muted);padding:9px 15px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:600;white-space:nowrap;transition:background .2s var(--ease-soft),color .2s var(--ease-soft),box-shadow .2s var(--ease-soft)}
.reportTabs button.active{background:var(--surface-solid);color:var(--ink);box-shadow:var(--shadow-soft)}

.filterBar{display:flex;gap:8px;margin-bottom:12px}
.filterBar .input{max-width:280px}

.explanationBody{display:flex;flex-direction:column;gap:16px}

.explanationCase{border:1px solid var(--line);border-radius:var(--radius-md);padding:19px;background:var(--surface-soft)}
.explanationCase h3{font-size:14.5px;font-weight:700;margin-bottom:12px}
.explainGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
@media(max-width:760px){.explainGrid{grid-template-columns:1fr 1fr}}
.explainGrid>div{display:flex;flex-direction:column;gap:3px;background:var(--surface-solid);border:1px solid var(--line);border-radius:var(--radius-xs);padding:9px 12px}
.explainGrid span{font-size:10px;color:var(--muted);font-weight:600}
.explainGrid strong{font-size:12.5px;font-weight:700;font-variant-numeric:tabular-nums;font-family:"Inter",sans-serif}
.explainNote{font-size:12.5px;color:var(--ink);background:var(--accent-soft);border-radius:var(--radius-xs);padding:10px 13px;margin-bottom:12px;line-height:1.7}
.explainYears{display:flex;flex-direction:column;gap:4px;margin-bottom:4px}
.explainYearRow{font-size:12.5px;line-height:1.8;padding:8px 12px;border-radius:var(--radius-xs);background:var(--surface-solid);border:1px solid var(--line);font-variant-numeric:tabular-nums}
.explainResult{font-size:13px;padding-top:10px;margin-top:8px;border-top:1px solid var(--line)}

const MIN_YEAR=1900,MAX_YEAR=2100,MAX_MONEY=1e12,MAX_RATE=1000;

function clampNumber(value,min,max,fallback){
  const n=numberValue(value);
  if(!Number.isFinite(n))return fallback;
  return Math.min(max,Math.max(min,n));
}

function migrateCase(item){
  let next=item;
  if(!("includeShortage" in next)){
    const scope=next.scope||"both";
    next={
      ...next,
      includeShortage:scope!=="expenses",
      includeExpenses:scope!=="shortage",
      includeInvestment:next.applyReturn!==false
    };
    if(next.appliesTo==="shortageOnly"){
      next.investmentOnShortage=true;
      next.investmentOnExpenses=false;
    }
  }
  if(!("investmentOnShortage" in next)){
    next={...next,investmentOnShortage:next.includeShortage,investmentOnExpenses:next.includeExpenses};
  }
  return next;
}

function loadState(){
  try{
    const saved=JSON.parse(localStorage.getItem("investment-return-pro")||"null");
    if(!saved)return structuredCloneSafe(defaultState);
    if(!["commercial15","actualActual","inclusiveMonths"].includes(saved.accrual)){
      saved.accrual="commercial15";
    }
    return{
      ...structuredCloneSafe(defaultState),
      ...saved,
      view:["cases","people","report"].includes(saved.view)?saved.view:"cases",
      reportTab:["ledger","peopleTotals","distributionDetails","explanation"].includes(saved.reportTab)?saved.reportTab:"ledger",
      rates:{...DEFAULT_RATES,...(saved.rates||{})},
      cases:(Array.isArray(saved.cases)&&saved.cases.length?saved.cases:[blankCase()]).map(item=>migrateCase({compounding:true,...item})),
      people:Array.isArray(saved.people)&&saved.people.length?saved.people:[{id:uid(),name:"",joinDate:"",leaveDate:""}],
      exportOptions:{
        sheets:{ledger:true,peopleTotals:true,distributionDetails:true,explanation:true,...(saved.exportOptions&&saved.exportOptions.sheets||{})},
        mode:(saved.exportOptions&&saved.exportOptions.mode==="separate")?"separate":"combined"
      },
      currency:typeof saved.currency==="string"?saved.currency.slice(0,12):"",
      numerals:saved.numerals==="arab"?"arab":"latn",

      dataExportOptions:{workspace:true,rates:true,holidays:true,logic:true,...(saved.dataExportOptions||{})}
    };
  }catch{

  }

function structuredCloneSafe(value){

function esc(value){
  return String(value??"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function parseDate(value){
  if(!/^\d{4}-\d{2}-\d{2}$/.test(value||""))return null;
  const [y,m,d]=value.split("-").map(Number);
  if(y<MIN_YEAR||y>MAX_YEAR)return null;
  const date=new Date(y,m-1,d);
  if(date.getFullYear()!==y||date.getMonth()!==m-1||date.getDate()!==d)return null;
  return date;
}

function dateKey(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,"0");
  const d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function utcDayNumber(date){
  return Date.UTC(date.getFullYear(),date.getMonth(),date.getDate())/86400000;
}

function inclusiveDays(start,end){
  return Math.max(0,utcDayNumber(end)-utcDayNumber(start)+1);
}

function daysInYear(year){
  return new Date(year,1,29).getMonth()===1?366:365;
}

function normalizeCommercialStart(d){
  if(d.getDate()>15)return new Date(d.getFullYear(),d.getMonth()+1,1);
  return new Date(d.getFullYear(),d.getMonth(),1);
}

function normalizeCommercialEnd(d){
  if(d.getDate()>=15)return new Date(d.getFullYear(),d.getMonth()+1,0);
  return new Date(d.getFullYear(),d.getMonth(),0);
}

function generateSegments(start,end){
  const segments=[];
  if(state.accrual==="commercial15"){
    const effStart=normalizeCommercialStart(start);
    const effEnd=normalizeCommercialEnd(end);
    if(effStart>effEnd)return[];
    for(let y=effStart.getFullYear();y<=effEnd.getFullYear();y++){
      const segStart=(y===effStart.getFullYear())?effStart:new Date(y,0,1);
      const segEnd=(y===effEnd.getFullYear())?effEnd:new Date(y,11,31);
      const months=(segEnd.getFullYear()-segStart.getFullYear())*12+segEnd.getMonth()-segStart.getMonth()+1;
      segments.push({year:y,from:segStart,to:segEnd,months,days:0,factor:months/12});
    }
    return segments;
  }
  for(let y=start.getFullYear();y<=end.getFullYear();y++){
    const from=start>new Date(y,0,1)?new Date(start):new Date(y,0,1);
    const to=end<new Date(y,11,31)?new Date(end):new Date(y,11,31);
    const days=inclusiveDays(from,to);
    const months=(to.getFullYear()-from.getFullYear())*12+to.getMonth()-from.getMonth()+1;
    const factor=state.accrual==="actualActual"?days/daysInYear(y):months/12;
    segments.push({year:y,from,to,months,days,factor});
  }
  return segments;
}

function clampRange(aStart,aEnd,bStart,bEnd){
  const start=aStart>bStart?aStart:bStart;
  const end=aEnd<bEnd?aEnd:bEnd;
  return start<=end?{start,end}:null;
}

function roundUnit(value){
  const v=Number(value)||0;
  const s=v<0?-1:1;
  return s*Math.round(Math.abs(v)+1e-9);
}

function numberValue(value){
  const n=Number(value);
  return Number.isFinite(n)?n:0;
}

function effectiveExtraRate(){
  return state.extraRateEnabled?clampNumber(state.extraRate,-MAX_RATE,MAX_RATE,0):0;
}

function grossWeekdayCount(start,totalDays,weekendSet){
  if(totalDays<=0)return 0;
  const startDow=start.getDay();
  const fullWeeks=Math.floor(totalDays/7);
  const remainder=totalDays%7;
  let total=fullWeeks*(7-weekendSet.size);
  for(let i=0;i<remainder;i++){
    if(!weekendSet.has((startDow+i)%7))total++;
  }
  return total;
}

function holidayOccurrencesInRange(start,end){
  const occurrences=[];
  const startYear=start.getFullYear(),endYear=end.getFullYear();
  for(const h of state.holidays){
    const hd=parseDate(h.date);
    if(!hd)continue;
    if(h.repeatsAnnually){
      for(let y=startYear;y<=endYear;y++){
        const occ=new Date(y,hd.getMonth(),hd.getDate());
        if(occ.getMonth()!==hd.getMonth())continue; // guard Feb 29 rollover in non-leap years
        occurrences.push(occ);
      }
    }else{
      occurrences.push(hd);
    }
  }
  return occurrences;
}

function workingDays(start,end){
  if(!start||!end||start>end)return 0;
  const weekendSet=new Set(state.weekend);
  const totalDays=inclusiveDays(start,end);
  let total=grossWeekdayCount(start,totalDays,weekendSet);
  const s=utcDayNumber(start),e=utcDayNumber(end);
  for(const hd of holidayOccurrencesInRange(start,end)){
    const hn=utcDayNumber(hd);
    if(hn<s||hn>e)continue;
    if(weekendSet.has(hd.getDay()))continue;
    total--;
  }
  return Math.max(0,total);
}

function allocateUnits(total,weights,mode){
  const step=mode==="whole"?1:mode==="cents"?0.01:null;
  const cleanWeights=weights.map(w=>Math.max(0,numberValue(w)));
  const weightTotal=cleanWeights.reduce((a,b)=>a+b,0);
  if(weightTotal<=0)return cleanWeights.map(()=>0);
  if(step===null){
    return cleanWeights.map(w=>total*w/weightTotal);
  }
  const totalSteps=Math.round(total/step);
  const exact=cleanWeights.map(w=>totalSteps*w/weightTotal);
  const floors=exact.map(Math.floor);
  let remaining=totalSteps-floors.reduce((a,b)=>a+b,0);
  exact
    .map((value,index)=>({index,remainder:value-Math.floor(value)}))
    .sort((a,b)=>b.remainder-a.remainder||a.index-b.index)
    .forEach(item=>{
      if(remaining>0){floors[item.index]++;remaining--;}
      else if(remaining<0){floors[item.index]--;remaining++;}
    });
  return floors.map(v=>Math.round(v*step*100)/100);
}

function componentsLabel(item,t){
  const parts=[];
  if(item.includeShortage)parts.push(t.chipShortage);
  if(item.includeExpenses)parts.push(t.chipExpenses);
  const base=parts.length?parts.join(" + "):t.noComponents;
  if(!item.includeInvestment)return`${base} (${t.noInvestmentSuffix})`;
  const onParts=[];
  if(item.investmentOnShortage)onParts.push(t.chipShortage);
  if(item.investmentOnExpenses)onParts.push(t.chipExpenses);
  const onLabel=onParts.length?onParts.join(" + "):t.noComponents;
  return`${base} + ${t.chipInvestment} (${t.investmentAppliesTo}: ${onLabel})`;
}

function applyRounding(rawSegments,mode){
  const segments=rawSegments.map(s=>({...s,returnValue:0}));
  let total=0;
  if(mode==="none"){
    segments.forEach(s=>{s.returnValue=s.rawReturn;});
    total=segments.reduce((sum,s)=>sum+s.rawReturn,0);
    return{segments,total};
  }
  if(mode==="perSegment"){
    segments.forEach(s=>{
      s.returnValue=roundUnit(s.rawReturn);
      total+=s.returnValue;
    });
    return{segments,total};
  }
  const exactTotal=segments.reduce((sum,s)=>sum+s.rawReturn,0);
  total=roundUnit(exactTotal);
  segments.forEach(s=>{s.returnValue=s.rawReturn;});
  return{segments,total};
}

function buildRawSegments(start,end,principal,compounding,customRate){
  const missingYears=[];
  const useCustom=customRate!==null&&customRate!==undefined;
  let runningPrincipal=principal;
  const segments=generateSegments(start,end).map(seg=>{
    let annualRate;
    if(useCustom){
      annualRate=customRate;
    }else{
      const rawRate=state.rates[seg.year];
      const missing=rawRate===""||rawRate===null||rawRate===undefined;
      if(missing)missingYears.push(seg.year);
      annualRate=missing?0:numberValue(rawRate);
    }
    const appliedRate=annualRate+effectiveExtraRate();
    const segPrincipal=runningPrincipal;
    const rawReturn=segPrincipal*appliedRate/100*seg.factor;
    if(compounding)runningPrincipal+=rawReturn;
    return{...seg,annualRate,appliedRate,segPrincipal,rawReturn};
  });
  return{segments,missingYears};
}

function computeCase(item){
  const start=parseDate(item.startDate);
  const end=parseDate(item.endDate);
  const shortage=clampNumber(item.shortageValue,0,MAX_MONEY,0);
  if(!start||!end||start>end||shortage<=0)return null;

  const expenseRate=clampNumber(item.expensesRate,0,MAX_RATE,0);
  const expenseValue=shortage*expenseRate/100;
  const includeShortage=item.includeShortage!==false;
  const includeExpenses=!!item.includeExpenses;
  const includeInvestment=item.includeInvestment!==false;
  const investmentOnShortage=item.investmentOnShortage!==false;
  const investmentOnExpenses=item.investmentOnExpenses!==false;
  const base=(includeShortage?shortage:0)+(includeExpenses?expenseValue:0);
  const principal=(investmentOnShortage?shortage:0)+(investmentOnExpenses?expenseValue:0);
  const t=I18N[state.lang];

  const applyReturn=includeInvestment;
  const useCustomRate=!!item.useCustomRate;
  const customRate=useCustomRate?clampNumber(item.customRate,-MAX_RATE,MAX_RATE,0):null;
  let segments=[],returnValue=0,missingYears=[];
  if(applyReturn){
    const raw=buildRawSegments(start,end,principal,item.compounding,customRate);
    const applied=applyRounding(raw.segments,item.rounding);
    segments=applied.segments;
    returnValue=applied.total;
    missingYears=raw.missingYears;
  }
  const due=item.rounding==="none"?base+returnValue:roundUnit(base+returnValue);

  return{
    id:item.id,
    name:item.name.trim()||`${t.calculation} ${state.cases.findIndex(c=>c.id===item.id)+1}`,
    shortage,
    expenseRate,
    expenseValue,
    base,
    principal,
    start,
    end,
    includeShortage,
    includeExpenses,
    includeInvestment,
    investmentOnShortage,
    investmentOnExpenses,
    rounding:item.rounding,
    compounding:!!item.compounding,
    applyReturn,
    useCustomRate,
    customRate,
    segments,
    returnValue,
    due,
    missingYears
  };
}

function eligiblePeople(){
  return state.people.filter(person=>person.name.trim());
}

function personRange(person,start,end){
  const join=parseDate(person.joinDate)||start;
  const leave=parseDate(person.leaveDate)||end;
  if(join>leave)return null;
  return clampRange(join,leave,start,end);
}

function personWeight(person,start,end){
  const range=personRange(person,start,end);
  return range?workingDays(range.start,range.end):0;
}

function personSegments(person,result,principalShare){
  const range=personRange(person,result.start,result.end);
  if(!range)return{segments:[],returnValue:0,missingYears:[]};
  const{segments:rawSegments,missingYears}=buildRawSegments(range.start,range.end,principalShare,result.compounding);
  const{segments,total}=applyRounding(rawSegments,result.rounding);
  return{segments,returnValue:total,missingYears};
}

function distributeCase(result,people){
  if(!people.length)return{rows:[],detailRows:[],unallocated:result.due};

  if(state.distribution==="express"){
    const returnMode=result.rounding==="none"?"exact":"whole";
    const baseShares=allocateUnits(result.base,people.map(()=>1),"cents");
    const returnShares=allocateUnits(result.returnValue,people.map(()=>1),returnMode);
    const rows=people.map((person,index)=>({
      caseId:result.id,caseName:result.name,personId:person.id,personName:person.name,
      days:null,principalShare:baseShares[index],returnValue:returnShares[index],amount:baseShares[index]+returnShares[index]
    }));
    const distributedTotal=rows.reduce((sum,r)=>sum+r.amount,0);
    return{rows,detailRows:rows.map(r=>({...r,year:null,period:null,annualRate:null,appliedRate:null,factor:null})),unallocated:roundUnit(result.due-distributedTotal)};
  }

  const weights=people.map(person=>personWeight(person,result.start,result.end));
  const weightTotal=weights.reduce((a,b)=>a+b,0);

  if(weightTotal<=0){
    const rows=people.map(person=>({
      caseId:result.id,caseName:result.name,personId:person.id,personName:person.name,
      days:0,principalShare:0,returnValue:0,amount:0
    }));
    return{rows,detailRows:[],unallocated:result.due};
  }

  const principalShares=allocateUnits(result.principal,weights,"cents");
  const baseShares=allocateUnits(result.base,weights,"cents");
  const rows=[];
  const detailRows=[];

  people.forEach((person,index)=>{
    if(weights[index]<=0){
      rows.push({caseId:result.id,caseName:result.name,personId:person.id,personName:person.name,days:0,principalShare:0,returnValue:0,amount:0});
      return;
    }
    const calc=personSegments(person,result,principalShares[index]);
    calc.missingYears.forEach(year=>{if(!result.missingYears.includes(year))result.missingYears.push(year);});
    const amount=baseShares[index]+calc.returnValue;
    const joinParsed=parseDate(person.joinDate);
    const leaveParsed=parseDate(person.leaveDate);
    const clamped=!!((joinParsed&&joinParsed<result.start)||(leaveParsed&&leaveParsed>result.end));
    rows.push({
      caseId:result.id,caseName:result.name,personId:person.id,personName:person.name,
      days:weights[index],principalShare:baseShares[index],returnValue:calc.returnValue,amount,clamped
    });
    if(calc.segments.length){
      calc.segments.forEach(seg=>{
        detailRows.push({
          caseId:result.id,caseName:result.name,personId:person.id,personName:person.name,
          year:seg.year,period:{from:seg.from,to:seg.to},days:weights[index],
          principalShare:seg.segPrincipal,annualRate:seg.annualRate,appliedRate:seg.appliedRate,
          factor:seg.factor,returnValue:seg.returnValue,noAccrual:false,clamped
        });
      });
    }else{
      detailRows.push({
        caseId:result.id,caseName:result.name,personId:person.id,personName:person.name,
        year:null,period:null,days:weights[index],
        principalShare:principalShares[index],annualRate:0,appliedRate:0,
        factor:0,returnValue:0,noAccrual:true,clamped
      });
    }
  });

  const distributedTotal=rows.reduce((sum,r)=>sum+r.amount,0);
  return{rows,detailRows,unallocated:roundUnit(result.due-distributedTotal)};
}

function computeAll(){
  const valid=state.cases.map(computeCase).filter(Boolean);
  const invalidCount=state.cases.length-valid.length;
  const people=eligiblePeople();
  const distributionDetails=[];
  const distributionRows=[];
  let unallocatedRaw=0;

  valid.forEach(result=>{
    const distribution=distributeCase(result,people);
    distributionRows.push(...distribution.rows);
    distributionDetails.push(...distribution.detailRows);
    unallocatedRaw+=distribution.unallocated;
  });

  const summaryMap=new Map();
  distributionRows.forEach(row=>{
    if(!summaryMap.has(row.personId)){
      summaryMap.set(row.personId,{personId:row.personId,personName:row.personName,days:0,principalShare:0,returnValue:0,amount:0});
    }
    const target=summaryMap.get(row.personId);
    if(row.days!==null)target.days+=row.days;
    if(row.principalShare!==null)target.principalShare+=row.principalShare;
    target.returnValue+=row.returnValue;
    target.amount+=row.amount;
  });

  return{
    cases:valid,
    invalidCount,
    people,
    distributionRows,
    distributionDetails,
    distributionSummary:[...summaryMap.values()],
    shortageTotal:valid.reduce((sum,item)=>sum+item.shortage,0),
    expenseTotal:valid.reduce((sum,item)=>sum+item.expenseValue,0),
    returnTotal:valid.reduce((sum,item)=>sum+item.returnValue,0),
    grandTotal:valid.reduce((sum,item)=>sum+item.due,0),
    missingYears:[...new Set(valid.flatMap(item=>item.missingYears))].sort((a,b)=>a-b),
    clampedCount:distributionRows.filter(row=>row.clamped).length,
    unallocated:roundUnit(unallocatedRaw)
  };
}

function formatMoneyInput(raw){
  const cleaned=String(raw??"").replace(/,/g,"");
  if(cleaned==="")return"";
  const n=Number(cleaned);
  if(!Number.isFinite(n))return cleaned;
  const parts=cleaned.split(".");
  const intPart=Math.trunc(Math.abs(n)).toLocaleString("en-US");
  const sign=n<0?"-":"";
  return parts.length>1?`${sign}${intPart}.${parts[1]}`:`${sign}${intPart}`;
}

function numeralSystem(){
  return(state.lang==="ar"&&state.numerals==="arab")?"arab":"latn";
}

function currencySuffix(){
  const c=(state.currency||"").toString().trim().slice(0,12);
  return c?` ${esc(c)}`:"";
}

function money(value){
  return new Intl.NumberFormat(state.lang==="ar"?"ar-EG":"en-US",{minimumFractionDigits:2,maximumFractionDigits:2,numberingSystem:numeralSystem()}).format(numberValue(value))+currencySuffix();
}

function moneyPrecise(value){
  return new Intl.NumberFormat(state.lang==="ar"?"ar-EG":"en-US",{minimumFractionDigits:2,maximumFractionDigits:6,numberingSystem:numeralSystem()}).format(numberValue(value))+currencySuffix();
}

function decimal(value,digits=6){
  return new Intl.NumberFormat(state.lang==="ar"?"ar-EG":"en-US",{maximumFractionDigits:digits,numberingSystem:numeralSystem()}).format(numberValue(value));
}

function percent(value){
  return `${decimal(value,4)}%`;
}

function formatDate(date){
  if(!date)return"";
  return new Intl.DateTimeFormat(state.lang==="ar"?"ar-EG":"en-GB",{year:"numeric",month:"short",day:"numeric",numberingSystem:numeralSystem()}).format(date);
}

function periodText(from,to){
  return `${formatDate(from)} — ${formatDate(to)}`;
}

let currentPanelAnchor=null;

function ensureFloatingPanelHost(){
  const panel=document.getElementById("floatingPanel");
  if(!panel)return;
  const openDialog=document.querySelector("dialog[open]");
  const host=openDialog||document.body;
  if(panel.parentElement!==host)host.appendChild(panel);
}

function positionFloatingPanel(anchor){
  const panel=document.getElementById("floatingPanel");
  if(!panel||!anchor)return;
  const rect=anchor.getBoundingClientRect();
  const pw=panel.offsetWidth,ph=panel.offsetHeight;
  const vw=window.innerWidth,vh=window.innerHeight;
  const rtl=document.documentElement.getAttribute("dir")==="rtl";
  let left=rtl?rect.right-pw:rect.left;
  if(left+pw>vw-8)left=vw-8-pw;
  if(left<8)left=8;
  let top=rect.bottom+6;
  if(top+ph>vh-8)top=Math.max(8,rect.top-ph-6);
  panel.style.left=`${left}px`;
  panel.style.top=`${top}px`;
}

function onFloatingPanelOutsideClick(e){
  const panel=document.getElementById("floatingPanel");
  if(!panel)return;
  if(panel.contains(e.target))return;
  if(currentPanelAnchor&&(currentPanelAnchor===e.target||currentPanelAnchor.contains?.(e.target)))return;
  closeFloatingPanel();
}

function onFloatingPanelKeydown(e){
  if(e.key==="Escape")closeFloatingPanel();
}

function attachFloatingPanelHandlers(){
  document.addEventListener("mousedown",onFloatingPanelOutsideClick,true);
  document.addEventListener("keydown",onFloatingPanelKeydown,true);
}

function closeFloatingPanel(){
  const panel=document.getElementById("floatingPanel");
  if(panel){
    panel.style.display="none";
    panel.innerHTML="";
    panel.className="floatingPanel";
    if(panel.parentElement!==document.body)document.body.appendChild(panel);
  }
  currentPanelAnchor?.classList?.remove("panelOpen");
  currentPanelAnchor=null;
  document.removeEventListener("mousedown",onFloatingPanelOutsideClick,true);
  document.removeEventListener("keydown",onFloatingPanelKeydown,true);
}

function openSelectPanel(anchor,options,value,onPick){
  const panel=document.getElementById("floatingPanel");
  const reopening=currentPanelAnchor===anchor&&panel.style.display==="block";
  closeFloatingPanel();
  if(reopening)return;
  ensureFloatingPanelHost();
  currentPanelAnchor=anchor;
  anchor.classList.add("panelOpen");
  panel.className="floatingPanel panelList";
  panel.innerHTML="";
  options.forEach(opt=>{
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="panelOption"+(opt.value===value?" active":"");
    btn.textContent=opt.label;
    btn.addEventListener("click",()=>{onPick(opt.value);closeFloatingPanel();});
    panel.appendChild(btn);
  });
  panel.style.display="block";
  panel.style.width=`${Math.max(anchor.offsetWidth,170)}px`;
  requestAnimationFrame(()=>positionFloatingPanel(anchor));
  attachFloatingPanelHandlers();
}

function applySelectField(buttonEl,value,options,applyFn){
  applyFn(value);
  const span=buttonEl.querySelector("span");
  if(span)span.textContent=optionLabel(options,value);
}

function setDateSegValues(wrapperEl,iso){
  const parts=iso?iso.split("-"):["","",""];
  const y=wrapperEl.querySelector(".ySeg"),m=wrapperEl.querySelector(".mSeg"),d=wrapperEl.querySelector(".dSeg");
  if(y)y.value=parts[0]||"";
  if(m)m.value=parts[1]||"";
  if(d)d.value=parts[2]||"";
}

function applyDateField(wrapperEl,iso,applyFn){
  applyFn(iso);
  wrapperEl.dataset.iso=iso||"";
  setDateSegValues(wrapperEl,iso);
}

function segAutoCompletes(el,value){
  if(value.length!==1)return false;
  const d=Number(value);
  if(el.classList.contains("dSeg"))return d>=4;
  if(el.classList.contains("mSeg"))return d>=2;
  return false;
}

function advanceDateSeg(el){
  const wrapper=el.closest(".dateField");
  const next=el.classList.contains("dSeg")?wrapper.querySelector(".mSeg")
    :el.classList.contains("mSeg")?wrapper.querySelector(".ySeg"):null;
  if(next){next.focus();next.select();}
  else{el.blur();}
}

function handleDateSegInput(el){
  el.value=el.value.replace(/\D/g,"").slice(0,el.maxLength);
  clearTimeout(el._advanceTimer);
  if(!el.value.length)return;
  if(el.value.length>=el.maxLength||segAutoCompletes(el,el.value)){
    advanceDateSeg(el);
  }else{
    el._advanceTimer=setTimeout(()=>advanceDateSeg(el),550);
  }
}

function handleDateSegKeydown(e,el){
  if(e.key==="Backspace"&&!el.value){
    const wrapper=el.closest(".dateField");
    const prev=el.classList.contains("ySeg")?wrapper.querySelector(".mSeg")
      :el.classList.contains("mSeg")?wrapper.querySelector(".dSeg"):null;
    if(prev){prev.focus();prev.select();e.preventDefault();}
    return;
  }
  if(e.key==="ArrowUp"||e.key==="ArrowDown"){
    e.preventDefault();
    clearTimeout(el._advanceTimer);
    const isYear=el.classList.contains("ySeg");
    const max=el.classList.contains("dSeg")?31:el.classList.contains("mSeg")?12:MAX_YEAR;
    let val=(Number(el.value)||(isYear?new Date().getFullYear():0))+(e.key==="ArrowUp"?1:-1);
    if(isYear){if(val<MIN_YEAR)val=MIN_YEAR;if(val>MAX_YEAR)val=MAX_YEAR;}
    else{if(val<1)val=max;if(val>max)val=1;}
    el.value=isYear?String(val):String(val).padStart(2,"0");
    el.dispatchEvent(new Event("change",{bubbles:false}));
    return;
  }
  handleFastEntry(e);
}

function handleDateSegPaste(e,el,applyFn){
  const text=(e.clipboardData||window.clipboardData).getData("text");
  const iso=parseFlexibleDate(text);
  if(!iso)return;
  e.preventDefault();
  applyDateField(el.closest(".dateField"),iso,applyFn);
}

function commitDateSegments(el,applyFn){
  const wrapper=el.closest(".dateField");
  const dEl=wrapper.querySelector(".dSeg"),mEl=wrapper.querySelector(".mSeg"),yEl=wrapper.querySelector(".ySeg");
  if(!dEl.value&&!mEl.value&&!yEl.value){
    applyFn("");
    wrapper.dataset.iso="";
    return;
  }
  const d=dEl.value.length===1?dEl.value.padStart(2,"0"):dEl.value;
  const m=mEl.value.length===1?mEl.value.padStart(2,"0"):mEl.value;
  const y=yEl.value;
  if(d.length!==2||m.length!==2||y.length!==4)return;
  const iso=`${y}-${m}-${d}`;
  const parsed=parseDate(iso);
  if(!parsed){
    setDateSegValues(wrapper,wrapper.dataset.iso||"");
    return;
  }
  dEl.value=d;
  mEl.value=m;
  applyFn(iso);
  wrapper.dataset.iso=iso;
}

function dateFieldHTML(iso,applyExpr,idAttr){
  const parts=iso?iso.split("-"):["","",""];
  const y=parts[0]||"",m=parts[1]||"",d=parts[2]||"";
  return`<span class="dateField"${idAttr?` id="${esc(idAttr)}"`:""} data-iso="${esc(iso||"")}">
    <input type="text" class="dateSeg dSeg" inputmode="numeric" maxlength="2" placeholder="dd" value="${esc(d)}" oninput="handleDateSegInput(this)" onkeydown="handleDateSegKeydown(event,this)" onchange="commitDateSegments(this,${applyExpr})" onpaste="handleDateSegPaste(event,this,${applyExpr})" onfocus="this.select()">
    <span class="dateSep">-</span>
    <input type="text" class="dateSeg mSeg" inputmode="numeric" maxlength="2" placeholder="mm" value="${esc(m)}" oninput="handleDateSegInput(this)" onkeydown="handleDateSegKeydown(event,this)" onchange="commitDateSegments(this,${applyExpr})" onpaste="handleDateSegPaste(event,this,${applyExpr})" onfocus="this.select()">
    <span class="dateSep">-</span>
    <input type="text" class="dateSeg ySeg" inputmode="numeric" maxlength="4" placeholder="yyyy" value="${esc(y)}" oninput="handleDateSegInput(this)" onkeydown="handleDateSegKeydown(event,this)" onchange="commitDateSegments(this,${applyExpr})" onpaste="handleDateSegPaste(event,this,${applyExpr})" onfocus="this.select()">
    <button type="button" class="copyToggleBtn" tabindex="-1" title="${esc(I18N[state.lang].copyDateTitle)}" onclick="openDateCopyPanel(this.parentElement,this.parentElement.dataset.iso,v=>applyDateField(this.parentElement,v,${applyExpr}))">${ICONS.clipboard}</button>
    <button type="button" class="calBtn" tabindex="-1" onclick="openDatePicker(this.parentElement,this.parentElement.dataset.iso,v=>applyDateField(this.parentElement,v,${applyExpr}))">${ICONS.calendar}</button>
  </span>`;
}

function collectDateSources(){
  const t=I18N[state.lang];
  const list=[];
  state.cases.forEach((c,i)=>{
    const label=c.name||`${t.calculation} ${i+1}`;
    if(c.startDate)list.push({label:`${label} — ${t.start}`,iso:c.startDate});
    if(c.endDate)list.push({label:`${label} — ${t.end}`,iso:c.endDate});
  });
  state.people.forEach((p,i)=>{
    const label=p.name||`${t.person} ${i+1}`;
    if(p.joinDate)list.push({label:`${label} — ${t.join}`,iso:p.joinDate});
    if(p.leaveDate)list.push({label:`${label} — ${t.leave}`,iso:p.leaveDate});
  });
  const seen=new Set();
  return list.filter(item=>{
    const key=item.label+"|"+item.iso;
    if(seen.has(key))return false;
    seen.add(key);
    return true;
  });
}

function openDateCopyPanel(anchor,isoValue,onPick){
  const panel=document.getElementById("floatingPanel");
  const reopening=currentPanelAnchor===anchor&&panel.style.display==="block";
  closeFloatingPanel();
  if(reopening)return;
  ensureFloatingPanelHost();
  currentPanelAnchor=anchor;
  anchor.classList.add("panelOpen");
  const t=I18N[state.lang];
  const sources=collectDateSources().filter(s=>s.iso!==isoValue);
  panel.className="floatingPanel panelList";
  panel.innerHTML=`
    ${isoValue?`<button type="button" class="panelOption" data-copy-current="1" style="display:flex;align-items:center;gap:8px">${ICONS.clipboard}${esc(t.copyDateValue)}</button><div style="height:1px;background:var(--line);margin:4px 6px"></div>`:""}
    ${sources.length?sources.map(s=>`<button type="button" class="panelOption" data-pick-iso="${esc(s.iso)}">${esc(s.label)} — ${esc(formatDate(parseDate(s.iso)))}</button>`).join(""):`<p class="hint" style="padding:9px 11px 6px">${esc(t.noOtherDates)}</p>`}
  `;
  panel.style.display="block";

function openDatePicker(anchor,isoValue,onPick){
  const panel=document.getElementById("floatingPanel");
  const reopening=currentPanelAnchor===anchor&&panel.style.display==="block";
  closeFloatingPanel();
  if(reopening)return;
  ensureFloatingPanelHost();
  currentPanelAnchor=anchor;
  anchor.classList.add("panelOpen");

  const view={year:initial.getFullYear(),month:initial.getMonth(),mode:"days",selected:isoValue||"",onPick};

function renderDaysGrid(view){
  const days=weekdayShortLabels();
  const firstOfMonth=new Date(view.year,view.month,1);
  const startOffset=firstOfMonth.getDay();
  const daysCount=new Date(view.year,view.month+1,0).getDate();
  const todayKey=dateKey(new Date());
  const cells=[];
  for(let i=0;i<startOffset;i++)cells.push(null);
  for(let d=1;d<=daysCount;d++)cells.push(d);
  return`
    <div class="datePanelWeekdays">${days.map(d=>`<span>${esc(d)}</span>`).join("")}</div>
    <div class="datePanelGrid">
      ${cells.map(d=>{
        if(d===null)return`<span class="dateCell empty"></span>`;
        const iso=`${view.year}-${String(view.month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
        const cls=["dateCell"];
        if(iso===view.selected)cls.push("selected");
        if(iso===todayKey)cls.push("today");
        return`<button type="button" class="${cls.join(" ")}" data-day="${d}">${d}</button>`;
      }).join("")}
    </div>
  `;
}

function renderMonthsGrid(view){
  const months=state.lang==="ar"?monthLabels():monthShortLabels();
  const selectedDate=parseDate(view.selected);
  const todayYear=new Date().getFullYear();
  const todayMonth=new Date().getMonth();
  const gridClass=state.lang==="ar"?"datePanelGridWide monthsGridAr":"datePanelGridWide";
  return`
    <div class="${gridClass}">
      ${months.map((label,index)=>{
        const cls=["blockCell"];
        if(selectedDate&&selectedDate.getFullYear()===view.year&&selectedDate.getMonth()===index)cls.push("selected");
        else if(view.year===todayYear&&index===todayMonth)cls.push("today");
        return`<button type="button" class="${cls.join(" ")}" data-month="${index}">${esc(label)}</button>`;
      }).join("")}
    </div>
  `;
}

function renderYearsGrid(view){
  const rangeStart=Math.floor(view.year/12)*12;
  const selectedDate=parseDate(view.selected);
  const todayYear=new Date().getFullYear();
  const years=Array.from({length:12},(_,i)=>rangeStart+i);
  return`
    <div class="datePanelGridWide">
      ${years.map(year=>{
        const cls=["blockCell"];
        if(selectedDate&&selectedDate.getFullYear()===year)cls.push("selected");
        else if(year===todayYear)cls.push("today");
        return`<button type="button" class="${cls.join(" ")}" data-year="${year}">${year}</button>`;
      }).join("")}
    </div>
  `;
}

function datePanelTitleText(view,t){
  if(view.mode==="years"){
    const rangeStart=Math.floor(view.year/12)*12;
    return `${rangeStart}–${rangeStart+11}`;
  }
  if(view.mode==="months")return `${view.year}`;
  return `${monthLabels()[view.month]} ${view.year}`;
}

function renderDatePickerPanel(view,anchor){
  const panel=document.getElementById("floatingPanel");
  const t=I18N[state.lang];
  const rtl=document.documentElement.getAttribute("dir")==="rtl";

  const body=view.mode==="days"?renderDaysGrid(view):view.mode==="months"?renderMonthsGrid(view):renderYearsGrid(view);
  const titleHTML=view.mode==="years"
    ?`<input type="text" inputmode="numeric" class="datePanelYearJump" data-year-jump="1" maxlength="4" value="${esc(view.year)}">`
    :`<button type="button" class="datePanelTitleBtn" data-drill="1">${esc(datePanelTitleText(view,t))}</button>`;

  panel.className="floatingPanel datePanel";
  panel.style.width="272px";
  panel.innerHTML=`
    <div class="datePanelHead">
      <button type="button" class="datePanelNav" data-nav="prev">${rtl?ICONS.chevronRight:ICONS.chevronLeft}</button>
      ${titleHTML}
      <button type="button" class="datePanelNav" data-nav="next">${rtl?ICONS.chevronLeft:ICONS.chevronRight}</button>
    </div>
    <div class="datePanelBody">${body}</div>
    <div class="datePanelFoot">
      <button type="button" class="ghostBtn" data-today="1">${esc(t.todayLabel)}</button>
      <button type="button" class="ghostBtn" data-clear="1">${esc(t.clearDate)}</button>
    </div>
  `;
  panel.style.display="block";

  panel.querySelector('[data-nav="prev"]').onclick=()=>{
    if(view.mode==="days"){view.month--;if(view.month<0){view.month=11;view.year--;}}
    else if(view.mode==="months"){view.year--;}
    else{view.year-=12;}
    renderDatePickerPanel(view,anchor);
  };
  panel.querySelector('[data-nav="next"]').onclick=()=>{
    if(view.mode==="days"){view.month++;if(view.month>11){view.month=0;view.year++;}}
    else if(view.mode==="months"){view.year++;}
    else{view.year+=12;}
    renderDatePickerPanel(view,anchor);
  };
  const drillBtn=panel.querySelector('[data-drill]');
  if(drillBtn)drillBtn.onclick=()=>{
    view.mode=view.mode==="days"?"months":"years";
    renderDatePickerPanel(view,anchor);
  };
  const yearJump=panel.querySelector('[data-year-jump]');
  if(yearJump){
    const commitJump=()=>{
      if(!yearJump.isConnected)return;
      const val=Math.round(numberValue(yearJump.value));
      if(val&&val!==view.year){view.year=val;renderDatePickerPanel(view,anchor);}
    };
    yearJump.addEventListener("input",()=>{yearJump.value=yearJump.value.replace(/\D/g,"").slice(0,4);});
    yearJump.addEventListener("keydown",e=>{if(e.key==="Enter"){e.preventDefault();commitJump();}});
    yearJump.addEventListener("blur",()=>{setTimeout(commitJump,0);});
    requestAnimationFrame(()=>{yearJump.focus();yearJump.select();});
  }

  if(view.mode==="days"){
    panel.querySelectorAll("[data-day]").forEach(cell=>{
      cell.onclick=()=>{
        const iso=`${view.year}-${String(view.month+1).padStart(2,"0")}-${String(cell.dataset.day).padStart(2,"0")}`;
        view.onPick(iso);closeFloatingPanel();
      };
    });
  }else if(view.mode==="months"){
    panel.querySelectorAll("[data-month]").forEach(cell=>{
      cell.onclick=()=>{view.month=Number(cell.dataset.month);view.mode="days";renderDatePickerPanel(view,anchor);};
    });
  }else{

function excelSerialToISO(serial){
  const n=Number(serial);
  if(!Number.isFinite(n)||n<=0||n>200000)return"";
  const epoch=Date.UTC(1899,11,30);
  const date=new Date(epoch+Math.round(n)*86400000);
  const iso=`${date.getUTCFullYear()}-${String(date.getUTCMonth()+1).padStart(2,"0")}-${String(date.getUTCDate()).padStart(2,"0")}`;
  return parseDate(iso)?iso:"";
}

function parseFlexibleDate(value){
  if(typeof value==="number")return excelSerialToISO(value);
  const v=(value||"").toString().trim();
  if(!v)return"";
  if(/^\d{5,6}$/.test(v))return excelSerialToISO(v);
  const isoPrefix=v.match(/^(\d{4}-\d{2}-\d{2})/);
  if(isoPrefix)return parseDate(isoPrefix[1])?isoPrefix[1]:"";
  const slash=v.match(/^(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{4})/);
  if(slash){
    const day=slash[1].padStart(2,"0");
    const month=slash[2].padStart(2,"0");
    const iso=`${slash[3]}-${month}-${day}`;
    return parseDate(iso)?iso:"";
  }
  return"";
}

function handleRatesFileUpload(input){
  const file=input.files&&input.files[0];
  if(!file)return;
  const t=I18N[state.lang];
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array"});
      const rows=firstNonEmptySheet(wb);
      if(!rows.length)throw new Error("empty");
      let startIdx=0;
      const first=(rows[0]||[]).map(c=>(c??"").toString().trim().toLowerCase());
      if(first.some(v=>v.includes("year")||v.includes("سنة"))||first.some(v=>v.includes("rate")||v.includes("سعر")))startIdx=1;
      let added=0,skipped=0;
      for(let i=startIdx;i<rows.length;i++){
        try{
          const row=rows[i];
          if(!row||!row.length)continue;
          const yearRaw=row[0],rateRaw=row[1];
          if(yearRaw===undefined||yearRaw===null||yearRaw===""||rateRaw===undefined||rateRaw===null||rateRaw===""){skipped++;continue;}
          const year=Math.round(clampNumber(yearRaw,MIN_YEAR,MAX_YEAR,0));
          if(!year){skipped++;continue;}
          state.rates[year]=clampNumber(rateRaw,-MAX_RATE,MAX_RATE,0);
          added++;
        }catch{
          skipped++;
        }
      }
      saveState();
      renderSettingsBody();
      renderDynamic();
      showStatus(skipped?`${t.importedRates} ${added} · ${t.skippedRows} ${skipped}`:`${t.importedRates} ${added}`);
    }catch(err){
      alert(t.importReadError);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value="";
}

function ledgerRows(cases){
  const t=I18N[state.lang];
  return cases.flatMap(item=>{
    const compoundingLogic=item.compounding?t.compoundingMode:t.simpleMode;
    const logic=`${componentsLabel(item,t)} · ${compoundingLogic} · ${getAccrualLabel(state.accrual,t)} · ${roundingLabel(item.rounding,t)}`;

    if(!item.segments.length){
      const emptyReason=item.applyReturn===false?t.returnDisabledNotice:t.noAccrualPeriod;
      return[`
        <tr>
          <td><span class="pill">${esc(item.name)}</span></td>
          <td>—</td>
          <td>${periodText(item.start,item.end)}</td>
          <td class="money">${money(item.shortage)}</td>
          <td>${percent(item.expenseRate)}</td>
          <td class="money">${money(item.expenseValue)}</td>
          <td class="money">${money(item.base)}</td>
          <td class="money">—</td>
          <td>—</td>
          <td>—</td>
          <td>—</td>
          <td>—</td>
          <td>—</td>
          <td class="money accentText">${money(0)}</td>
          <td class="money">${item.rounding==="none"?moneyPrecise(item.due):money(item.due)}</td>
          <td class="mutedText">${esc(logic)} · ${esc(emptyReason)}</td>
          <td><button class="copyBtn" onclick="copyRow(this)" title="${t.copyRow}">${ICONS.copy}</button></td>
        </tr>
      `];
    }

    return item.segments.map(seg=>{
      const duration=state.accrual==="actualActual"?`${seg.days} ${t.days}`:`${seg.months} ${t.months}`;
      return`
        <tr>
          <td><span class="pill">${esc(item.name)}</span></td>
          <td>${seg.year}</td>
          <td>${periodText(seg.from,seg.to)}</td>
          <td class="money">${money(item.shortage)}</td>
          <td>${percent(item.expenseRate)}</td>
          <td class="money">${money(item.expenseValue)}</td>

function reportTableHTML(data){
  const t=I18N[state.lang];
  const query=state.filter.trim().toLowerCase();

  if(!data.cases.length)return`<div class="empty">${t.noResults}</div>`;

  if(state.reportTab==="explanation"){
    return explanationHTML(data);
  }

  if(state.reportTab==="ledger"){
    const cases=query?data.cases.filter(item=>item.name.toLowerCase().includes(query)||item.segments.some(seg=>String(seg.year).includes(query))):data.cases;
    return`
      <div class="tableShell">

        </table>

    return`

function reportPeriodRangeText(data){
  if(!data.cases.length)return"";
  const minStart=data.cases.reduce((min,c)=>c.start<min?c.start:min,data.cases[0].start);
  const maxEnd=data.cases.reduce((max,c)=>c.end>max?c.end:max,data.cases[0].end);
  return periodText(minStart,maxEnd);
}

function setPeopleFilter(value){
  peopleFilterText=value;
  refreshPeopleTable();
}

function refreshPeopleTable(data){
  const tbody=document.getElementById("peopleTableBody");
  if(!tbody)return;
  const active=document.activeElement;
  let refocusSelector=null,selStart=null,selEnd=null;
  if(active&&tbody.contains(active)){
    const tr=active.closest("tr[data-person-id]");
    if(tr){
      const pid=tr.dataset.personId;
      const segClass=["dSeg","mSeg","ySeg"].find(c=>active.classList.contains(c));
      if(segClass)refocusSelector=`tr[data-person-id="${pid}"] .${segClass}`;
      else if(active.dataset.field==="name")refocusSelector=`tr[data-person-id="${pid}"] input[data-field="name"]`;
      if(refocusSelector){selStart=active.selectionStart;selEnd=active.selectionEnd;}
    }
  }
  tbody.innerHTML=peopleTableRowsHTML(data);
  if(refocusSelector){
    const el=tbody.querySelector(refocusSelector);
    if(el){
      el.focus();
      try{el.setSelectionRange(selStart,selEnd);}catch{}
    }
  }
}

function personLiveStats(personId,data){
  return data.distributionSummary.find(r=>r.personId===personId)||null;
}

function applyCaseDatesToPerson(id){
  const first=state.cases[0];
  const person=state.people.find(p=>p.id===id);
  if(!first||!person||(!first.startDate&&!first.endDate))return;
  if(first.startDate)person.joinDate=first.startDate;
  if(first.endDate)person.leaveDate=first.endDate;
  render();
  saveState();
}

function peopleTableRowsHTML(data){
  const t=I18N[state.lang];
  data=data||computeAll();
  const query=peopleFilterText.trim().toLowerCase();
  const visible=query?state.people.filter(p=>p.name.toLowerCase().includes(query)):state.people;
  return visible.map(person=>{
    const index=state.people.indexOf(person);
    const stats=person.name.trim()?personLiveStats(person.id,data):null;

const PEOPLE_HEADER_HINTS={
  name:["name","الاسم","اسم"],
  join:["join","start","from","بداية","انضمام","استلام"],
  leave:["leave","end","to","نهاية","انسحاب","تسوية"]
};

function detectHeaderColumns(row){
  if(!Array.isArray(row))return null;
  const cols={name:-1,join:-1,leave:-1};
  row.forEach((cell,idx)=>{
    const v=(cell??"").toString().trim().toLowerCase();
    if(!v)return;
    if(cols.name===-1&&PEOPLE_HEADER_HINTS.name.some(h=>v.includes(h)))cols.name=idx;
    else if(cols.join===-1&&PEOPLE_HEADER_HINTS.join.some(h=>v.includes(h)))cols.join=idx;
    else if(cols.leave===-1&&PEOPLE_HEADER_HINTS.leave.some(h=>v.includes(h)))cols.leave=idx;
  });
  return cols.name!==-1?cols:null;
}

function firstNonEmptySheet(wb){
  for(const name of wb.SheetNames){
    const sheet=wb.Sheets[name];
    const rows=XLSX.utils.sheet_to_json(sheet,{header:1,raw:false,dateNF:"yyyy-mm-dd",blankrows:false});
    if(rows.length)return rows;
  }
  return[];
}

function handlePeopleFileUpload(input){
  const file=input.files&&input.files[0];
  if(!file)return;
  const t=I18N[state.lang];
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:"array",cellDates:true});
      const rows=firstNonEmptySheet(wb);
      if(!rows.length)throw new Error("empty");
      let cols={name:0,join:1,leave:2};
      let startIdx=0;
      const headerCols=detectHeaderColumns(rows[0]);
      if(headerCols){
        cols=headerCols;
        startIdx=1;
      }else{
        const startIsDate=!!parseFlexibleDate(rows[0][1]);
        const endIsDate=!!parseFlexibleDate(rows[0][2]);
        if(!startIsDate&&!endIsDate&&(rows[0][0]||"").toString().trim())startIdx=1;
      }
      let added=0,skipped=0;
      for(let i=startIdx;i<rows.length;i++){
        try{
          const row=rows[i];
          if(!row||!row.length)continue;
          const name=(row[cols.name]??"").toString().trim();
          if(!name){continue;}
          const fallback=inheritedPerson();
          const joinDate=(cols.join>-1?parseFlexibleDate(row[cols.join]):"")||fallback.joinDate;
          const leaveDate=(cols.leave>-1?parseFlexibleDate(row[cols.leave]):"")||fallback.leaveDate;
          state.people.push({id:uid(),name:name.slice(0,200),joinDate,leaveDate});
          added++;
        }catch{
          skipped++;
        }
      }
      render();
      saveState();
      showStatus(skipped?`${t.importedPeople} ${added} · ${t.skippedRows} ${skipped}`:`${t.importedPeople} ${added}`);
    }catch(err){
      alert(t.importReadError);
    }
  };
  reader.readAsArrayBuffer(file);
  input.value="";
}

function exportStateJSON(){
  const t=I18N[state.lang];
  const payload=buildDataExportPayload();
  const keys=Object.keys(payload).filter(k=>!k.startsWith("__"));
  if(!keys.length){showStatus(t.noResults);return;}
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  const stamp=new Date().toISOString().slice(0,10);
  a.href=url;
  a.download=`${t.title}-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
  showStatus(t.exported);
}
