function sanitizeImportedCase(item){
  if(!item||typeof item!=="object")return null;
  return migrateCase({...blankCase(),...item,id:uid()});
}

function sanitizeImportedPerson(item){
  if(!item||typeof item!=="object")return null;
  const name=(item.name??"").toString().trim().slice(0,200);
  if(!name)return null;
  return{
    id:uid(),
    name,
    joinDate:parseDate(item.joinDate)?item.joinDate:"",
    leaveDate:parseDate(item.leaveDate)?item.leaveDate:""
  };
}

function handleStateFileUpload(input){
  const file=input.files&&input.files[0];
  if(!file)return;
  const t=I18N[state.lang];
  const reader=new FileReader();
  reader.onload=(e)=>{
    try{
      const data=JSON.parse(e.target.result);
      if(!data||typeof data!=="object")throw new Error("bad");
      if(Array.isArray(data.cases)&&data.cases.length){
        const cleaned=data.cases.map(sanitizeImportedCase).filter(Boolean);
        if(cleaned.length)state.cases=cleaned;
      }
      if(Array.isArray(data.people)&&data.people.length){
        const cleaned=data.people.map(sanitizeImportedPerson).filter(Boolean);
        if(cleaned.length)state.people=cleaned;
      }
      if(data.rates&&typeof data.rates==="object"){
        Object.entries(data.rates).forEach(([year,rate])=>{
          const y=Math.round(clampNumber(year,MIN_YEAR,MAX_YEAR,0));
          if(y)state.rates[y]=rate===""?"":clampNumber(rate,-MAX_RATE,MAX_RATE,0);
        });
      }
      if(Array.isArray(data.holidays)){
        state.holidays=data.holidays.filter(h=>h&&typeof h==="object"&&parseDate(h.date)).map(h=>({
          id:uid(),
          name:(h.name??"").toString().trim().slice(0,80),
          date:h.date,
          repeatsAnnually:!!h.repeatsAnnually
        }));
      }
      if(Array.isArray(data.weekend)){
        state.weekend=data.weekend.filter(d=>Number.isInteger(d)&&d>=0&&d<=6);
      }
      if(typeof data.accrual==="string"&&["commercial15","actualActual","inclusiveMonths"].includes(data.accrual))state.accrual=data.accrual;
      if(data.extraRate!==undefined)state.extraRate=clampNumber(data.extraRate,-MAX_RATE,MAX_RATE,0);
      if(typeof data.extraRateEnabled==="boolean")state.extraRateEnabled=data.extraRateEnabled;
      if(typeof data.distribution==="string"&&["express","expanded"].includes(data.distribution))state.distribution=data.distribution;
      if(typeof data.currency==="string")state.currency=data.currency.slice(0,12);
      if(data.numerals==="arab"||data.numerals==="latn")state.numerals=data.numerals;
      render();
      saveState();
      showStatus(t.dataImported);
    }catch(err){
      alert(t.importReadError);
    }
  };
  reader.readAsText(file);
  input.value="";
}

function clearWorkspace(){
  const t=I18N[state.lang];
  if(!confirm(t.dataClearConfirm))return;
  state.cases=[blankCase()];
  state.people=[{id:uid(),name:"",joinDate:"",leaveDate:""}];
  render();
  saveState();
  showStatus(t.dataCleared);
}

function copyRow(btn){
  const tr=btn.closest("tr");
  if(!tr)return;
  const cells=[...tr.querySelectorAll("td")].filter(td=>!td.querySelector(".copyBtn"));
  const text=cells.map(td=>td.textContent.trim()).join("\t");
  navigator.clipboard?.writeText(text).then(()=>showStatus(I18N[state.lang].copied));
}

function extractVisibleTable(){
  const table=document.querySelector("#reportTable table");
  if(!table)return null;
  return[...table.querySelectorAll("tr")].map(tr=>
    [...tr.querySelectorAll("th,td")]
      .filter(cell=>!cell.querySelector(".copyBtn"))
      .map(cell=>cell.textContent.trim())
  );
}

function extractVisibleExplanation(){
  const el=document.querySelector("#reportTable .explanationBody");
  if(!el)return null;
  return el.innerText.split("\n").map(l=>l.trim()).filter(Boolean);
}

function copyTable(){
  if(state.reportTab==="explanation"){
    const lines=extractVisibleExplanation();
    if(!lines)return;
    navigator.clipboard?.writeText(lines.join("\n")).then(()=>showStatus(I18N[state.lang].copied));
    return;
  }
  const rows=extractVisibleTable();
  if(!rows)return;
  const text=rows.map(r=>r.join("\t")).join("\n");
  navigator.clipboard?.writeText(text).then(()=>showStatus(I18N[state.lang].copied));
}

function exportLedgerRows(data,t){
  const unitLabel=state.accrual==="actualActual"?t.days:t.months;
  const header=[t.case,t.year,t.period,t.shortage,`${t.expenseRate} (%)`,t.expenseValue,t.base,t.yearPrincipal,`${t.annualRate} (%)`,`${t.addition} (%)`,`${t.appliedRate} (%)`,`${t.duration} (${unitLabel})`,t.factor,t.returned,t.due,t.logic];
  const rows=[header];
  data.cases.forEach(item=>{
    const compoundingLogic=item.compounding?t.compoundingMode:t.simpleMode;
    const logic=`${componentsLabel(item,t)} · ${compoundingLogic} · ${getAccrualLabel(state.accrual,t)} · ${roundingLabel(item.rounding,t)}`;
    if(!item.segments.length){
      const emptyReason=item.applyReturn===false?t.returnDisabledNotice:t.noAccrualPeriod;
      rows.push([item.name,"",periodText(item.start,item.end),item.shortage,item.expenseRate,item.expenseValue,item.base,"","","","","","",0,item.due,`${logic} · ${emptyReason}`]);
      return;
    }
    item.segments.forEach(seg=>{
      const duration=state.accrual==="actualActual"?seg.days:seg.months;
      rows.push([item.name,seg.year,periodText(seg.from,seg.to),item.shortage,item.expenseRate,item.expenseValue,item.base,Number(seg.segPrincipal.toFixed(2)),seg.annualRate,effectiveExtraRate(),seg.appliedRate,duration,Number(seg.factor.toFixed(6)),Number(seg.returnValue.toFixed(2)),item.due,logic]);
    });
  });
  return rows;
}

function exportPeopleTotalsRows(data,t){
  const header=[t.person];
  if(state.distribution==="expanded")header.push(t.workdayWeight);
  header.push(t.principalShare,t.returned,t.due,t.logic);
  const rows=[header];
  data.distributionSummary.forEach(row=>{
    const line=[row.personName];
    if(state.distribution==="expanded")line.push(row.days);
    line.push(Number(row.principalShare.toFixed(2)),Number(row.returnValue.toFixed(2)),Number(row.amount.toFixed(2)),state.distribution==="express"?t.equalLogic:t.workdayLogic);
    rows.push(line);
  });
  return rows;
}

function exportDistributionDetailRows(data,t){
  if(state.distribution==="express"){
    const header=[t.case,t.person,t.principalShare,t.returned,t.due,t.logic];
    const rows=[header];
    data.distributionRows.forEach(row=>rows.push([row.caseName,row.personName,Number(row.principalShare.toFixed(2)),Number(row.returnValue.toFixed(2)),Number(row.amount.toFixed(2)),t.equalLogic]));
    return rows;
  }
  const header=[t.case,t.person,t.year,t.period,t.workdayWeight,t.principalShare,`${t.annualRate} (%)`,`${t.appliedRate} (%)`,t.factor,t.returned];
  const rows=[header];
  data.distributionDetails.forEach(row=>{
    rows.push([
      row.caseName,row.personName,
      row.noAccrual?"":row.year,
      row.noAccrual?t.noAccrualPeriod:periodText(row.period.from,row.period.to),
      row.days,
      Number(row.principalShare.toFixed(2)),
      row.noAccrual?"":row.annualRate,
      row.noAccrual?"":row.appliedRate,
      row.noAccrual?"":Number(row.factor.toFixed(6)),
      Number(row.returnValue.toFixed(2))
    ]);
  });
  return rows;
}

function exportExplanationRows(data,t){
  const lines=[];
  data.cases.forEach(item=>{
    lines.push(`${item.name} — ${periodText(item.start,item.end)}`);
    lines.push(`${t.shortage}: ${money(item.shortage)}`);
    lines.push(`${t.expenseRate}: ${percent(item.expenseRate)} → ${money(item.expenseValue)}`);
    lines.push(`${t.checklistTitle}: ${componentsLabel(item,t)}`);
    lines.push(`${t.base}: ${money(item.base)}`);
    lines.push(`${t.calculationLogic}: ${getAccrualLabel(state.accrual,t)}`);
    lines.push(`${t.returnMode}: ${item.compounding?t.compoundingMode:t.simpleMode}`);
    lines.push(`${t.rounding}: ${roundingLabel(item.rounding,t)}`);
    item.segments.forEach(seg=>{
      const duration=state.accrual==="actualActual"?`${seg.days} ${t.days}`:`${seg.months} ${t.months}`;
      lines.push(`  ${seg.year} · ${periodText(seg.from,seg.to)} (${duration}) — ${t.yearPrincipal}: ${money(seg.segPrincipal)} × ${percent(seg.appliedRate)} × ${decimal(seg.factor)} = ${money(seg.returnValue)}`);
    });
    lines.push(`${t.returnTotal}: ${money(item.returnValue)} · ${t.due}: ${money(item.due)}`);
    lines.push("");
  });
  if(data.people.length){
    lines.push(t.explainDistributionTitle);
    if(state.distribution==="express"){
      lines.push(`${t.equalSplitLine} ${data.people.length} ${t.people2}.`);
      lines.push(data.distributionSummary.map(r=>`${r.personName}: ${money(r.amount)}`).join(" · "));
    }else{
      data.distributionSummary.forEach(r=>{
        lines.push(`${r.personName}: ${decimal(r.days,0)} ${t.days} → ${t.principalShare} ${money(r.principalShare)} → ${t.returned} ${money(r.returnValue)} → ${t.due} ${money(r.amount)}`);
      });
    }
  }
  return lines.map(l=>[l]);
}

function exportSheetDefinitions(data,t){
  const defs=[
    {key:"ledger",label:t.ledger,rows:exportLedgerRows(data,t)},
    {key:"peopleTotals",label:t.peopleTotals,rows:exportPeopleTotalsRows(data,t)},
    {key:"distributionDetails",label:t.distributionDetails,rows:exportDistributionDetailRows(data,t)},
    {key:"explanation",label:t.explanationTab,rows:exportExplanationRows(data,t)}
  ];
  return defs.map(def=>{
    const width=Math.max(1,(def.rows[0]||[]).length);
    const aoa=[[summaryLine(data)],[],...def.rows];
    return{...def,aoa,merges:[{s:{r:0,c:0},e:{r:0,c:width-1}}]};
  });
}

function exportPanelHTML(t,data){
  const opts=state.exportOptions;
  const sheets=[
    {key:"ledger",label:t.ledger},
    {key:"peopleTotals",label:t.peopleTotals},
    {key:"distributionDetails",label:t.distributionDetails},
    {key:"explanation",label:t.explanationTab}
  ];
  const disabled=!data.cases.length;
  return`
    <div class="exportPanelHead">${t.exportSelectSheets}</div>
    <div class="exportSheetList">
      ${sheets.map(s=>`
        <div class="switchRow">
          <span class="switchRowLabel">${s.label}</span>
          <label class="switch">
            <input type="checkbox" ${opts.sheets[s.key]?"checked":""} onchange="toggleExportSheet('${s.key}',this.checked)">
            <span class="switchTrack"><span class="switchThumb"></span></span>
          </label>
        </div>
      `).join("")}
    </div>
    <div class="exportPanelHead">${t.exportModeLabel}</div>
    <div class="segmented" style="grid-template-columns:1fr 1fr">
      <button class="${opts.mode==="combined"?"active":""}" onclick="setExportMode('combined')">${t.exportAsWorkbook}</button>
      <button class="${opts.mode==="separate"?"active":""}" onclick="setExportMode('separate')">${t.exportAsSeparate}</button>
    </div>
    ${disabled?`<p class="hint">${t.noResults}</p>`:""}
    <button class="primaryBtn exportConfirmBtn" ${disabled?"disabled":""} onclick="performExport()">${ICONS.go} <span>${t.exportConfirm}</span></button>
  `;
}

function openExportPanel(anchor){
  const panel=document.getElementById("floatingPanel");
  const reopening=currentPanelAnchor===anchor&&panel.style.display==="block";
  closeFloatingPanel();
  if(reopening)return;
  currentPanelAnchor=anchor;
  anchor.classList.add("panelOpen");
  panel.className="floatingPanel exportPanel";
  renderExportPanelBody(anchor);
  attachFloatingPanelHandlers();
}

function renderExportPanelBody(anchor){
  const panel=document.getElementById("floatingPanel");
  const t=I18N[state.lang];
  const data=computeAll();
  panel.innerHTML=exportPanelHTML(t,data);
  panel.style.display="block";
  requestAnimationFrame(()=>positionFloatingPanel(anchor));
}

function toggleExportSheet(key,checked){
  state.exportOptions.sheets[key]=checked;
  saveState();
  if(currentPanelAnchor)renderExportPanelBody(currentPanelAnchor);
}

function setExportMode(mode){
  state.exportOptions.mode=mode;
  saveState();
  if(currentPanelAnchor)renderExportPanelBody(currentPanelAnchor);
}

function performExport(){
  if(typeof XLSX==="undefined"){
    alert("Excel export engine is loading, please try again in a moment.");
    return;
  }
  const t=I18N[state.lang];
  const data=computeAll();
  const defs=exportSheetDefinitions(data,t);
  const selected=defs.filter(def=>state.exportOptions.sheets[def.key]&&def.rows.length);
  if(!selected.length){
    showStatus(t.noResults);
    return;
  }
  const stamp=new Date().toISOString().slice(0,10);
  if(state.exportOptions.mode==="separate"){
    selected.forEach(def=>{
      const wb=XLSX.utils.book_new();
      const ws=XLSX.utils.aoa_to_sheet(def.aoa);
      ws["!merges"]=def.merges;
      XLSX.utils.book_append_sheet(wb,ws,def.label.slice(0,31));
      XLSX.writeFile(wb,`${def.label}-${stamp}.xlsx`);
    });
  }else{
    const wb=XLSX.utils.book_new();
    selected.forEach(def=>{
      const ws=XLSX.utils.aoa_to_sheet(def.aoa);
      ws["!merges"]=def.merges;
      XLSX.utils.book_append_sheet(wb,ws,def.label.slice(0,31));
    });
    XLSX.writeFile(wb,`${t.title}-${stamp}.xlsx`);
  }
  closeFloatingPanel();
  showStatus(t.exported);
}

function kpiStripHTML(data){
  const t=I18N[state.lang];
  data=data||computeAll();
  if(!data.cases.length){
    return`<div class="kpiEmpty">${t.noResults}</div>`;
  }
  return`
    <div class="kpiStrip">
      <div class="kpiCard">
        <span class="kpiLabel">${t.shortageTotal}</span>
        <span class="kpiValue">${money(data.shortageTotal)}</span>
        <span class="kpiSub">${data.cases.length} ${t.calculation}</span>
      </div>
      <div class="kpiCard">
        <span class="kpiLabel">${t.expenseTotal}</span>
        <span class="kpiValue">${money(data.expenseTotal)}</span>
      </div>
      <div class="kpiCard accent">
        <span class="kpiLabel">${t.returnTotal}</span>
        <span class="kpiValue">${money(data.returnTotal)}</span>
      </div>
      <div class="kpiCard">
        <span class="kpiLabel">${t.grandTotal}</span>
        <span class="kpiValue">${money(data.grandTotal)}</span>
      </div>
    </div>
  `;
}

function updateKpiStrip(data){
  const el=document.getElementById("kpiContainer");
  if(el)el.innerHTML=kpiStripHTML(data);
}

function updateCalcPreviews(){
  document.querySelectorAll(".caseCard").forEach(cardEl=>{
    const id=cardEl.dataset.caseId;
    const item=state.cases.find(c=>c.id===id);
    if(!item)return;
    const previewEl=cardEl.querySelector(".calcPreviewBody");
    if(previewEl)previewEl.innerHTML=caseCardCalculationHTML(item);
    const noticeEl=cardEl.querySelector(".rateNoticeSlot");
    if(noticeEl)noticeEl.innerHTML=caseCardMissingRatesHTML(item);
  });
}

function renderDynamic(){
  if(state.view==="report"){
    refreshReportView();
    return;
  }
  if(state.view==="cases")updateCalcPreviews();
  const data=(state.view==="cases"||state.view==="people")?computeAll():undefined;
  if(state.view==="people")refreshPeopleTable(data);
  updateKpiStrip(data);
}

function render(){
  document.documentElement.setAttribute("dir",state.lang==="ar"?"rtl":"ltr");
  document.documentElement.setAttribute("data-theme",state.theme);
  const t=I18N[state.lang];
  const app=document.getElementById("app");

  const viewBody=state.view==="cases"?casesViewHTML():state.view==="people"?peopleViewHTML():reportHTML();

  app.innerHTML=`
    <div class="topbar">
      <div class="brand">
        <div class="brandMark">${ICONS.logo}</div>
        <div><h1>${t.title}</h1></div>
      </div>
      <div class="mainNav">
        <button class="navBtn ${state.view==="cases"?"active":""}" onclick="setView('cases')">${t.navCases} <span class="navCount">${state.cases.length}</span></button>
        <button class="navBtn ${state.view==="people"?"active":""}" onclick="setView('people')">${t.navPeople} <span class="navCount">${state.people.length}</span></button>
        <button class="navBtn ${state.view==="report"?"active":""}" onclick="setView('report')">${t.navReport}</button>
      </div>
      <div class="actions">
        <button class="softBtn" onclick="toggleLanguage()">${t.lang}</button>
        <button class="iconBtn" onclick="toggleTheme()" title="${state.theme==='light'?t.dark:t.light}">${state.theme==='light'?ICONS.moon:ICONS.sun}</button>
        <button class="iconBtn" onclick="openSettings()" title="${t.settings}">${ICONS.settings}</button>
      </div>
    </div>
    <div id="viewContainer">${viewBody}</div>
  `;
}

render();
</script>
</body>
</html>
